; SyncSCUMM configuration template.
;
; This is the version-controlled TEMPLATE -- don't edit it in place. A live
; syncscumm.ini (copied from this file) is read from the door's CWD, which
; today is the vendored scummvm/ directory (xtrn/syncscumm/install-xtrn.ini's
; startup_dir). M2 has no installer step that seeds it there for you -- copy
; this file to src/doors/syncscumm/scummvm/syncscumm.ini by hand if you want
; to override the default. M5's real installer/picker will formalize where
; the live file lives (almost certainly copied in like the other doors'
; <name>.example.ini -> <name>.ini, via install-xtrn.ini's [copy:] action)
; and drop this hand-copy step.

; subtitles -- superimpose dialogue text for games whose speech can't be
; heard. Precedence, highest first:
;   1. USER: if the player's own ScummVM config (the per-user file the door's
;      -c argument points at, under data/user/<####>/scumm/) already sets
;      "subtitles" itself -- in its target section or the global [scummvm]
;      section -- that value always wins and this key is never consulted.
;   2. SYSOP (this key): auto | on | off, case-insensitive.
;   3. AUTO: on when the session has no working audio, off otherwise.
;      As of M2 there is NO audio path at all yet (that's M4's chunked-mixer
;      streaming work), so "auto" currently always resolves to "on" -- every
;      session gets subtitles until M4 wires real per-session audio-tier
;      detection (sst_io_audio_available(), door/sst_io.c).
; A missing file, a missing key, or an explicit "auto" here all mean the
; same thing: defer to step 3.
subtitles = auto

; sixel_max -- override the sixel image ceiling (pixels), clamping BOTH the
; width and height axes to this one value. 0 or absent (the default) means
; no override -- the door figures out a ceiling itself, in this order:
;   1. THIS key, if set -- always wins, no matter what the terminal reports.
;   2. The terminal's own XTSMGRAPHICS reply (ESC[?2;1S), when it answers --
;      the authoritative source, since the terminal told us its real limit.
;   3. Its exact reported pixel canvas (ESC[14t), trusted UNLESS the door
;      has positively identified the terminal as xterm (via XTVERSION) --
;      this is the common case for Windows Terminal and Foot, both of which
;      report an exact canvas but never answer XTSMGRAPHICS, and both
;      render sixels far larger than 1000x1000 just fine.
;   4. A conservative ~1000x1000 default otherwise -- notably, real xterm:
;      it reports a canvas too, but silently DISCARDS a sixel image whole
;      (not clipped) if its declared size exceeds this default, so its
;      canvas is deliberately NOT trusted the way WT/Foot's is.
; Set this only if a specific terminal misbehaves at the size the door
; would otherwise choose -- most sysops never need it.
sixel_max = 0
