; syncmoo1.ini -- SyncMOO1 door configuration.
; Copy to syncmoo1.ini beside the door binary. Every key below is optional.

[audio]
; Ogg/Vorbis VBR quality (0.0..1.0) for music tracks uploaded to the terminal.
; Lower = smaller upload, softer sound. Blank/absent = the termgfx default.
;music_quality = 0.4

[debug]
; Record both directions of the terminal conversation to
; data/syncmoo1/syncmoo1_n<node>.wire. Multi-MB per session, per node.
; Decode with tools/wiredump.py. Off unless you are debugging the door.
;wire = false

[1oom]
; Defaults for 1oom's own options, keyed by its cfg names (module.item).
; A player who changes one of these in the in-game options menu keeps their
; choice; a player who never touches it follows whatever you set here.
;
; MoO1's copy protection asks the player to look up a ship name in the printed
; manual, after year 40, on a random turn -- and ENDS THE GAME after three wrong
; answers. BBS players have no manual. Leave this true.
ui.copy_protection_disabled = true
; The intro is ~4.6 seconds of fades; skipping reaches the menu in ~0.3s.
game.skipintro = true
;opta.music = true
;opta.music_volume = 64
;opta.sfx = true
;opta.sfx_volume = 100
