; chat_llm.ini -- configuration for the LLM-backed chat engine
;
; Consumers: the BBS guru (1:1 paging), multi-user channel chat, IRC bots.
; Features: tool calling, BM25 retrieval (RAG), and persistent
; per-(speaker, persona) memory.  See https://wiki.synchro.net/module:chat_llm

[default]
; provider:  openai = OpenAI-compatible API (Ollama, Groq, OpenRouter,
;            llama.cpp, llama-server, LM Studio, OpenAI itself, etc.)
;            gemini = Google AI Studio native API (not yet implemented)
provider     = openai

; endpoint:  full URL of the chat-completions endpoint.
endpoint     = http://localhost:11434/v1/chat/completions

; model:     model identifier sent to the endpoint.
model        = qwen2.5:14b

; api_key:   bearer token. Ollama ignores this but the field must be
;            non-empty for spec compliance. Real providers (Groq,
;            OpenRouter, OpenAI) require their actual key here.
api_key      = ollama

max_tokens   = 300
; temperature 0.3 = conservative (less likely to invent fake facts).
; 0.7 was too creative; the model would confidently fabricate product
; names, dates, etc. when retrieval didn't cover the question.
temperature  = 0.3

; --- Typing simulation knobs ---
;
; typing_speed_factor: multiplier on the per-character delays in C++'s
; output_with_typing(). Higher = faster typing.
;   0    -- skip typing simulation entirely (instant bputs of full reply)
;   1.0  -- legacy speed (25-150ms per char, matches the original guru)
;   2.0  -- 2x faster (default; "confident typist" feel)
;   3.0+ -- snappy
typing_speed_factor   = 1.5

; simulate_typos: false skips the fat-finger + transposition error logic.
; At very high typing_speed_factor the typo correction sequences look
; weird since they happen in flashes -- sysop may prefer to disable.
simulate_typos        = true
; timeout in seconds. Set generously -- a cold model load on first call
; can take 15-30s for a 7B and longer for bigger models. 180 is safe.
timeout      = 180

; num_ctx: Ollama context window in tokens. Unset/0 (default) => omit
; from the request, letting Ollama use its server default (~4096).
; Raise this when your system_prompt + retrieved RAG context exceed the
; default: llama.cpp keeps the prompt's TAIL and truncates the FRONT, so
; the identity/style rules at the top of the system prompt get dropped
; and the bot starts answering as a generic "AI assistant". A large
; persona prompt (4000+ tokens) plus RAG can easily need 8192. Most
; 7B+ models are trained for 32768, so 8192 is safe headroom. (Tradeoff:
; a bigger window also lets the model answer state queries from RAG
; instead of calling tools -- re-run the tool/archive regression after
; changing this.) Ignored by non-Ollama providers.
;num_ctx     = 8192

; --- Long-form prompts ---
;
; Long prompts live in plain text files under ctrl/ (sysop-editable in
; any editor, no line-length pain, no INI escaping). Macros: @TOKEN@
; substitution works the same in files as it would inline. Available
; tokens:
;   @bot_name@           -- persona display name ("The Guru")
;   @system_name@        -- BBS name
;   @system_op@          -- sysop name
;   @alias@              -- current caller's alias
;   @real_name@          -- caller's real name (if known)
;   @level@              -- caller's security level
;   @location@           -- caller's location
;   @lang@ / @lang_name@ -- caller's language code / English name
;   @language_directive@ -- assembled "Respond in X" sentence (or English-only fallback)
;   @memory_summary@     -- rolling long-term memory ("Prior context about ...");
;                           empty when there's no prior conversation
; Unknown tokens become empty strings.
;
; system_prompt_file overrides system_prompt (and same for opening_*).
; Short prompts can stay inline if you prefer; long ones go in a file.
; The .utf8 extension signals to sysops that the file should be saved as
; UTF-8 (Synchronet convention for charset-significant files). The code
; just reads raw bytes; UTF-8 is what the LLM API expects.
system_prompt_file  = chat_llm_persona.utf8
;system_prompt      = (inline alternative -- short prompts only)

; opening_system_prompt_file is the system prompt for the opening greeting
; turn only (the bot's first line, before the caller speaks). If unset it
; falls back to system_prompt_file above. The bundled file tightens the
; greeting to a single short line.
opening_system_prompt_file = chat_llm_opening_persona.utf8
;opening_system_prompt     = (inline alternative)

; opening_prompt elicits a greeting at the START of a chat session
; (before the caller has typed anything). Leave blank to disable
; (the bot will wait silently for the caller to speak).
;
; Tip: avoid words like "paged" or "called" -- they push the model
; toward dial-up-era small talk ("how's the line?"). Phrase the prompt
; so the model focuses on the caller, not the connection.
opening_prompt_file = chat_llm_greeting.utf8
;opening_prompt     = (inline alternative)

; keep_alive (Ollama-specific; IGNORED by Ollama's OpenAI-compat endpoint,
; which is the endpoint llm.js uses. For durable model retention with
; Ollama, set the OLLAMA_KEEP_ALIVE env var on the Ollama SERVER instead
; (launchd plist on macOS, systemd EnvironmentFile on Linux, etc.).
;
; Some other backends (LM Studio, llama-server, future Ollama via /api/chat)
; may honor a per-request keep_alive in the JSON body. Uncomment and set if
; your backend supports it. Examples: "5m", "30m", "-1" (forever), "0".
;keep_alive  = -1

; --- Persistent per-(speaker, persona) memory ---
;
; Each (speaker, persona) pair gets a JSON file under data/chat/. Contains
; rolling-window transcript + LLM-compressed long-term summary. Survives
; BBS recycles. Speaker can wipe their own memory by saying "/forget me".

; Turn persistence on/off. Default true. Set false for public-channel
; bots (IRC in unknown channels) where you don't want to retain anything
; about strangers across sessions.
memory_persist        = true

; Verbatim transcript window. The most recent N turns are sent to the
; model in each request. Larger = better recall but more tokens AND
; significantly more LLM prompt-processing time on every turn (especially
; on large models -- a 14B model can spend 5-10s just processing a long
; prompt before generating any tokens). Short casual inputs (<4 tokens)
; automatically use a smaller window of 4. Default 8 balances recall vs
; latency for substantive turns.
history_window        = 8

; When the on-disk transcript exceeds this many turns, the oldest
; `summarize_batch` turns get compressed into the long-term summary via
; a one-shot LLM call. Defaults give ~3 summarizations per 100 turns.
summarize_threshold   = 30
summarize_batch       = 10

; Inject the rolling memory summary into the LLM's system prompt?
; Default true. The summary is wrapped in <long_term_memory>...</long_term_memory>
; markers (mirroring the <board_archive> pattern the system prompt knows not
; to quote). An earlier "PRIVATE NOTES" prose wrapper used to leak verbatim
; into replies; if your model still echoes the summary (watch the chat log
; for bullets appearing in bot replies), set this to false. The summary is
; still written to data/chat/*.json via summarize_old_turns either way --
; this knob only controls whether the model SEES it.
memory_summary_in_prompt = true

; Age-based pruning. Sessions older than this many days get dropped
; entirely on next load. Set to 0 to disable pruning.
memory_max_age_days   = 365

; --- BM25 retrieval index (read by exec/llm_index.js + llm.js) ---
;
; The indexer (`jsexec llm_index.js <persona>`) builds a BM25 index over
; configured content sources; llm.js queries it at chat-time and
; injects top-K hits into the prompt via @retrieved_context@ macro.
;
; index_sources -- SEMICOLON-separated source crawlers (commas are
; reserved for per-source argument lists, see msgbase below). Built-in
; source modules live in exec/llm_index/<name>.js. The colon-suffix
; arg means different things per source (filter, path, etc.):
;   msgbase                          -- ALL message base groups (likely too
;                                       much: USENET will drown out the
;                                       community content)
;   msgbase:Local,DOVE-Net,FsxNet,FidoNet
;                                    -- only these groups (recommended for
;                                       community-grounded answers)
;   filebase                         -- local file base descriptions
;   dokuwiki:/var/www/html/wiki/data/pages
;                                    -- local dokuwiki page tree.  Point at the
;                                       data/pages subdir, not data/ itself.
index_sources         = msgbase:Local,DOVE-Net,FsxNet,FidoNet

; Output index file (relative to data_dir). <persona> is substituted with
; the section name (chat_llm.ini section being read, default "default").
index_output          = chat/<persona>.idx

; How many top-scoring chunks llm.js injects into the prompt per turn.
; Lower = less noise but more risk of missing relevant content; higher =
; better recall but the model can get drowned in irrelevant chunks.
index_top_k           = 2

; Quality gate for retrieval. Computed as (top_hit_score / content_token_count)
; AFTER stopwords are stripped from the query. If below this value, retrieval
; is treated as "no relevant context" and nothing is injected -- the system
; prompt's "if it isn't in your board memory, say you haven't seen anything
; about it" rule takes over. Prevents the bot from fabricating BBS-local
; details when the user asks about something the message bases don't cover.
index_min_score_per_token = 3.0

; Indexer cap on total chunks ingested. Trims oldest if exceeded.
index_max_chunks      = 5000
