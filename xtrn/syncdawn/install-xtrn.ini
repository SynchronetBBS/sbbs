; SyncDawn installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncdawn
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncdawn)

Name: SyncDawn
Desc: Command & Conquer: Tiberian Dawn for the BBS -- graphics, sound, single-player campaign
By:   Rob Swindell / Westwood Studios / Vanilla Conquer
Cats: Games
Subs: Action, Strategy, Tiberian Dawn, RTS
Inst: 2026/07/11

; ---------------------------------------------------------------------------
; Single-player (campaign) Tiberian Dawn over DOOR32.SYS -- the second title
; of the SyncConquer door family, built from the SAME shell + vendored Vanilla
; Conquer engine as SyncAlert (Red Alert). A native executable with binary
; (untranslated) socket I/O: it emits DECSIXEL/JXL graphics and reads the
; client socket itself, fed the DOOR32.SYS drop file (%f) for the comm socket,
; user alias, and time left. Needs a SyncTERM-class sixel or JXL terminal (a
; text-tier fallback exists but RTS-on-text isn't a v1 usability promise --
; see the syncconquer DESIGN.md).
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   graphics and reads the socket itself)
; The CONQUER.MIX / theater MIX game data is located via the door's own argv/
; data-dir resolution (beside the binary, in an assets/ subdir -- see
; fetch-assets.js below), NOT via SCFG. -home gives each user their own
; storage dir for conquer.ini and savegames -- %juser/%4/tibdawn/ is
; data/user/<usernum>/tibdawn/, created on first run (mirrors SyncAlert's
; redalert/ dir and SyncDuke/SyncDOOM). Without it, config/saves would be
; shared by every player.
; NOTE: classic Tiberian Dawn is CAMPAIGN-ONLY for a solo caller -- it has no
; skirmish-vs-AI mode (that arrived with Red Alert), so this is the direct
; single-player campaign launcher; there is no lobby/skirmish entry.
; ---------------------------------------------------------------------------
; Like SyncAlert (and unlike SyncDuke/SyncDOOM, which fetch a prebuilt binary
; via a pre-exec script), SyncDawn has no downloadable binary to require here
; -- build it yourself first, then deploy it into this directory:
;   *nix:     src/doors/syncconquer/build.sh   then ./deploy.sh
;   Windows:  src/doors/syncconquer\build.bat  then deploy.bat  (MSVC/VS2022)
; (SyncDawn builds from the syncconquer tree -- the TD engine target -- once
; the vanilla/tiberiandawn/ engine is vendored; see the plans/ vendor plan.)
; The `cmd` line below uses %. for the platform's executable extension, so the
; same entry launches ./syncdawn or syncdawn.exe. There's no automated gate on
; any of this, so double-check the binary landed here (`ls syncdawn` /
; `dir syncdawn.exe`) before running this installer.
; ---------------------------------------------------------------------------
; XTRN_NODISPLAY: the door draws to the CLIENT's terminal and prints nothing
; locally (its diagnostics go to data/syncdawn/syncdawn_n<node>.log), so the
; BBS machine needs no console for it. On Windows this makes Synchronet spawn
; the door with CREATE_NO_WINDOW instead of CREATE_NEW_CONSOLE, so no console
; window ever appears. On *nix it suppresses the local-display handling.
; Existing installs must set this by hand: SCFG -> External Programs -> <the
; door> -> Disable Local Display.
[prog:SYNCDAWN]
name          = SyncDawn (Tiberian Dawn)
cmd           = syncdawn%. %f -home %juser/%4/tibdawn/
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the single-player (campaign) Tiberian Dawn launcher, via DOOR32.SYS. Requires a sixel- or JPEG-XL-capable terminal (SyncTERM) and the freeware Tiberian Dawn game data (CONQUER.MIX + theater MIX files) -- the next step can download it into xtrn/syncdawn/assets/ for you. SyncDawn ships no game data of its own.

; ---------------------------------------------------------------------------
; Optionally fetch the freeware Tiberian Dawn assets so the door is playable
; out of the box. SyncDawn ships no game data -- fetch-assets.js downloads the
; freeware game data, verifies its checksum, and extracts the MIX archives the
; engine needs (including the FMV movie data -- SyncConquer plays cutscenes,
; video plus A/V-synced audio, via the door's VQA backend, same as SyncAlert)
; into xtrn/syncdawn/assets/. Idempotent (skips assets already present) and
; non-fatal if it can't reach the internet -- you can always drop the MIX
; files in by hand later and re-run.
;
; It must be a .js file: install-xtrn.js only executes JavaScript ([exec:] runs
; it via js.exec()), and a non-.js name is a hard error that aborts the install
; *after* the program list is built but *before* ctrl/xtrn.ini is written --
; i.e. the door silently fails to install.
; ---------------------------------------------------------------------------
[exec:fetch-assets.js]
note     = SyncDawn needs the freeware Tiberian Dawn game data (CONQUER.MIX + theater MIX files). It can be downloaded now, then trimmed to the MIX files afterward.
prompt   = Download and install the freeware Tiberian Dawn game data now?
required = false
