; syncdawn.example.ini -- SyncDawn (Command & Conquer: Tiberian Dawn) door config
;
; To use: copy this file to "syncdawn.ini" in this same directory (next to the
; syncdawn binary) and edit the settings you want to change. Every setting is
; optional -- an absent file, section, or key falls back to the built-in
; default shown below, so you only need to list the ones you override.

[game]
; Full-motion video (FMV) cutscenes (intro, mission briefings, win/lose).
;   true  = always play them
;   false = never play them (skip straight to gameplay)
; Default (this key left absent/commented) is "auto": play the cutscenes only
; when the client can actually play audio -- a silent FMV is a poor experience
; and the heaviest thing the door sends over a terminal. Uncomment to force it.
;movies = true

[video]
; Differential "dirty-rectangle" rendering: each frame, re-send only the parts
; of the screen that actually changed (over the image the client still holds)
; instead of re-encoding the whole frame. Cuts bandwidth substantially -- most
; on a developed or mostly-static screen -- and never sends more than a full
; frame. Set to false if a particular terminal mis-composites the partial
; updates (seams or leftover pixels).
;dirty_rect = true
