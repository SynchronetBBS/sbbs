; syncmoo1.ini -- SyncMOO1 door configuration.
;
; `jsexec install-xtrn ../xtrn/syncmoo1` copies this file to syncmoo1.ini for
; you (it never overwrites an existing one).  The door reads syncmoo1.ini from
; its own directory -- this one -- at launch.  Every key is optional.

[video]
; Draw the game's own hand-shaped mouse cursor.  Off by default: your terminal
; already shows a mouse pointer, and the game's hand doesn't line up with it, so
; two cursors appear.  Set true if you prefer the original MoO1 hand.
;hand_cursor = false

[audio]
; Ogg/Vorbis VBR quality (0.0..1.0) for music tracks uploaded to the terminal.
; Lower = smaller upload, softer sound.  Blank/absent = the termgfx default.
;music_quality = 0.4

[debug]
; Record both directions of the terminal conversation to
; data/syncmoo1/syncmoo1_n<node>.wire.  Multi-MB per session, per node.
; Decode with tools/wiredump.py.  Off unless you are debugging the door.
;wire = false

; ---------------------------------------------------------------------------
; [1oom] -- defaults for the engine's own options, keyed by its cfg names
; (module.item; the modules are opt, opta, game, hw, hwx, ui).
;
; These are DEFAULTS, not overrides.  A player who changes one of them in the
; in-game options menu keeps their choice forever.  A player who never touches
; it follows whatever you set here -- including after you change your mind,
; because a player's config only ever records the settings they diverged on.
;
; Every key below is discoverable: play once and read your own
; data/user/####/moo1/1oom_config_game_classic_sbbs.txt.
;
; The block below is 1oom's own "1oom" preset (the in-game Options -> Preset ->
; 1oom button), with two deliberate departures for a BBS door:
;
;   * ui.mouse_warp_disabled is NOT set.  Upstream's preset disables mouse warp
;     because on a desktop it yanks the player's physical pointer around.  Over
;     a terminal we cannot move a physical pointer at all -- warping is how the
;     game's own hand cursor follows a keyboard hotkey.  Leave it enabled (the
;     default) or keyboard users lose their cursor.
;
;   * ui.copy_protection_disabled IS set, which the preset does not touch.
;     MoO1's copy protection asks the player to look up a ship name in the
;     printed manual -- after year 40, on a random turn -- and ENDS THE GAME
;     after three wrong answers.  BBS players have no manual.  Leave this true.
; ---------------------------------------------------------------------------
[1oom]
ui.copy_protection_disabled = true

; 1oom's quality-of-life additions across nearly every screen: emperor names in
; the empire report, fleet route lines and richer star labels on the starmap,
; the combat grid, a sorted weapon list in ship design.
ui.uiextra = true

; Show 1oom's extra save slots (continue / undo / init) in the Load Game list,
; not just MoO1's six.  A player who drops carrier mid-turn can resume.
ui.load_opts_extra = true

; The intro is ~4.6 seconds of palette fades; skipping reaches the menu in ~0.3s.
game.skipintro = true

; Make each screen's hotkey match the button it activates (R for Reloc rather
; than L, S for Ships rather than V), moving the displaced keys to A and C.
; Off in stock 1oom for fidelity to the 1993 binary, not because it is worse.
ui.illogical_hotkey_fix = true

; Up/Down search for the next widget in a cone rather than a narrow column, and
; skip widgets on the same row instead of sidestepping to them.
ui.kbd_cursor_keys_fix = true

; Re-resolve the widget under the cursor on button-press, and keep a drag on
; the same kind of widget (sliders, number fields).
ui.mouse_lmb_fix = true

; Offer to auto-resolve space combat.
ui.space_combat_autoresolve = true

; Starmap conveniences: draw ships on the map, expanded and smoother scrolling,
; and an explicit cursor context.
ui.ui_sm_ships_enabled = true
ui.sm_expanded_scroll = true
ui.sm_smoother_scrolling = true
ui.sm_explicit_cursor_context = true

; Audio defaults (1oom's own values shown).  music_volume/sfx_volume are 0..128.
;opta.music = true
;opta.music_volume = 64
;opta.sfx = true
;opta.sfx_volume = 100
