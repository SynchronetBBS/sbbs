; Master of Orion (syncmoo1) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncmoo1
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncmoo1)

Name: Master of Orion
Desc: The 4X space-empire classic, as a graphical BBS door (1oom engine)
By:   Rob Swindell / Simtex (1oom engine)
Cats: Games
Subs: Strategy, Space, 4X
Inst: 2026/07/08

; ---------------------------------------------------------------------------
; The door itself: a native binary run with raw (binary) socket I/O, fed the
; DOOR32.SYS drop file (%f) for the comm socket + time left, and a per-user
; home for 1oom's config + saved games (data/user/<num>/moo1/, isolated per
; user & node).  No screen geometry on the command line -- the door probes the
; live terminal size and cell dimensions at connect.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (the door emits raw
;                  sixel/CP437 graphics and reads the socket itself)
; startup_dir is intentionally left unset: install-xtrn.js then defaults it to
; THIS door directory, so the door runs with its own dir as the working dir --
; which is exactly where the MoO1 LBX data files (installed by the step below)
; are found (syncmoo1 registers its launch dir as 1oom's data path).
; ---------------------------------------------------------------------------
; No -name: the DOOR32.SYS drop file (%f) already carries the user's alias on
; line 7, which the door reads.  -name exists for the drop-file-less dev path
; (-s<fd>); passing both here would just set the same value twice, and since
; the door parses argv left to right, a trailing -name would silently outrank
; the drop file rather than defer to it.
[prog:SYNCMOO1]
name          = Master of Orion
cmd           = syncmoo1%. %f -home %juser/%4/moo1/
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the Master of Orion door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed the live configuration. The door reads syncmoo1.ini from its own
; directory at launch; only the documented template syncmoo1.example.ini is
; version-controlled, so the installer copies it to syncmoo1.ini here. If
; syncmoo1.ini already exists the installer prompts before overwriting -- an
; edited config is not clobbered without confirmation.
;
; Read the copy before your first player does. Without syncmoo1.ini the door
; runs on 1oom's stock defaults, and MoO1's copy protection is ARMED: after
; year 40, on a random turn, it demands a ship name printed in the boxed manual
; and ends the game after three wrong answers. The template disables that, and
; enables 1oom's own quality-of-life preset besides.
; ---------------------------------------------------------------------------
[copy:syncmoo1.example.ini]
dest = syncmoo1.ini

; ---------------------------------------------------------------------------
; Install the Master of Orion 1 game data (LBX files) from a copy YOU supply.
; 1oom is only the engine -- the original MoO1 v1.3 data is commercial content
; (c) Simtex / MicroProse and is NOT shipped with this door; a legally-owned
; copy is the sysop's to provide (it is still sold, e.g. as "Master of Orion
; 1+2" on GOG).  Drop your own copy into THIS door directory -- the loose *.lbx
; files, a .zip/archive containing them, or an extracted GOG/DOS game folder --
; and this step extracts/copies the LBX files into place.  Nothing is
; downloaded.  Re-runnable by hand at any time after dropping a copy in:
;     jsexec ../xtrn/syncmoo1/getdata.js
; Non-fatal (required = false): if no copy is found yet, the install still
; completes and getdata.js prints where to put one.
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Master of Orion 1 needs its original LBX data files (commercial content you supply -- not shipped).
prompt   = Install the MoO1 LBX game data now from a copy placed in the syncmoo1 door directory?
required = false
