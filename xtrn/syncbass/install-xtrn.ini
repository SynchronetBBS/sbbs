; Beneath a Steel Sky (syncbass) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncbass
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncbass)

Name: Beneath a Steel Sky
Desc: A freeware cyberpunk point-and-click adventure, as a BBS door (ScummVM)
By:   Revolution Software (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/18

; ---------------------------------------------------------------------------
; The door itself: a native binary (the SyncSCUMM ScummVM backend,
; src/doors/syncscumm) run with raw (binary) socket I/O, fed the DOOR32.SYS
; drop file (%f) for the comm socket + time left. Saves are per-user AND
; per-node-independent: --savepath points ScummVM's SavefileManager at
; data/user/<####>/syncbass/ and -c gives the same user their own
; scummvm.ini, so two nodes never race one save slot or one config file.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (the door emits raw
;                  sixel/JXL graphics and reads the socket itself)
;   XTRN_NODISPLAY -- no local console window for the door. The door draws
;                  to the CLIENT's terminal; on Windows, Synchronet would
;                  otherwise spawn it with CREATE_NEW_CONSOLE and pop up a
;                  console window on the BBS machine for every session
;                  (sbbs3/xtrn.cpp). Nothing is lost by hiding it: the
;                  door's own diagnostics are the ScummVM engine's normal
;                  stdout/stderr, which XTRN_NODISPLAY does not silence --
;                  only the extra window is suppressed. A sysop who wants
;                  the window back turns this off in SCFG -> External
;                  Programs -> Beneath a Steel Sky -> Disable Local Display.
; startup_dir is intentionally left unset: install-xtrn.js then defaults it
; to THIS door directory, so the door runs with its own dir as CWD -- which
; is where getdata.js drops the game data files and where the door itself
; looks for an optional syncscumm.ini (door-wide settings: subtitles, sixel
; ceiling, audio) if a sysop drops one in from
; src/doors/syncscumm/syncscumm.example.ini; this package does not seed one
; -- a missing file just means the door's own defaults apply.
;
; No --path is given. Unlike Flight of the Amazon Queen (syncqueen), which
; ships two builds and lets the door pick per session, Beneath a Steel Sky's
; CD build renders BOTH speech AND subtitles from a single data set, so it
; alone serves everyone and lives flat in THIS directory (sky.cpt, sky.dnr,
; sky.dsk). With no --path on the command line, door/syncscumm.cpp's main()
; defaults it to the door's own startup dir (this one) and runs it through
; sst_select_datadir(), which -- finding no ./talkie or ./floppy subdir --
; falls back to that directory for every session ("flat single build"). Audio
; then rides the subtitles-auto default: speech to a terminal that can play
; it, subtitles to one that cannot. A sysop who later wants the Talkie/Floppy
; split can create talkie/ + floppy/ subdirs here and the door will select
; between them automatically, no xtrn.ini change.
;
; cmd is capped at LEN_CMD (100 chars, sbbsdefs.h) in the runtime xtrn_t
; struct the C++ Terminal Server actually execs from; install-xtrn.js itself
; does NOT enforce this length, so an oversized cmd would install
; "successfully" but silently truncate the first time the BBS actually runs
; it. This cmd is 80 chars -- under budget, verified by hand at authoring
; time (no automated check here).
;
; No external engine-data (the SYNCSCUMM_DATA env var / --extrapath) is
; needed: the CD build getdata.js fetches carries sky.cpt (the sky engine's
; required data file) in this directory itself, so the door finds it. This is
; the difference the syncqueen package's comment notes -- BASS *does* need
; sky.cpt, but the CD build supplies it in-band; only the freeware *floppy*
; build (which this package deliberately does not use, see getdata.js) omits
; sky.cpt and would need it supplied separately.
; ---------------------------------------------------------------------------
[prog:SYNCSCUMM_BASS]
name          = Beneath a Steel Sky
cmd           = syncscumm%. %f --savepath=%juser/%4/syncbass -c %juser/%4/syncbass/scummvm.ini sky
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Beneath a Steel Sky door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference copy of the ScummVM game configuration in THIS directory.
; cmd's -c actually points ScummVM at each user's OWN scummvm.ini, under
; data/user/<####>/syncbass/ -- a path that does not exist yet at install time, so
; ScummVM creates it lazily (from its own built-in defaults) the first time
; that user launches the door; this step cannot seed it directly. What it
; does instead: only the version-controlled template scummvm.example.ini is
; checked in, so the installer copies it to THIS directory's scummvm.ini,
; giving the sysop a known-good [sky] template to read, hand-copy into a
; user's data/user/<####>/syncbass/scummvm.ini, or diff a player-edited config
; against. If scummvm.ini already exists here, the installer prompts before
; overwriting -- an edited copy is not clobbered without confirmation.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Game data: Beneath a Steel Sky was released as freeware by Revolution
; Software in 2003, and ScummVM hosts the CD build. getdata.js fetches it
; into this directory, verifying the zip against ScummVM's published .sha256 (via
; CryptContext's SHA-2 hash) before unpacking. Idempotent -- safe to re-run;
; if sky.cpt already exists it is left alone.
;
; Wired as an [exec:] step (install-xtrn.js's [exec:] loop only accepts a
; ".js" file: install_exec_cmd() in exec/install-xtrn.js hard-rejects
; anything else, "Only '.js' files may be executed" -- and a .sh could never
; run on a Windows install anyway). Downloads over HTTPS via
; HTTPRequest.Download and extracts natively (the Archive object, no shelling
; to unzip), matching this door family's other .js fetchers
; (syncqueen/getdata.js, syncmoo1/getdata.js). Non-fatal (required = false):
; a failed or declined download still lets the install complete; re-run by
; hand any time network access is available:
;     jsexec ../xtrn/syncbass/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Beneath a Steel Sky needs its freeware game data (the CD build), fetched over HTTPS from scummvm.org and sha256-verified.
prompt   = Download the Beneath a Steel Sky game data now?
required = false
