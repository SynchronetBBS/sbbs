; SyncSCUMM installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncscumm
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncscumm)

Name: SyncSCUMM
Desc: ScummVM point-and-click adventures (M2 test entry)
By:   Rob Swindell / ScummVM team
Cats: Games

; ---------------------------------------------------------------------------
; M2 minimal live-test entry: launches Beneath a Steel Sky (freeware, bundled
; as the door's test fixture) directly, so a sysop/tester can connect via
; SyncTERM and exercise the sixel/JXL present path end to end. This is NOT
; the real multi-game installer (game picker, catalog, per-title asset
; fetch) -- that's M5. One fixed entry, one fixed game, until then.
;
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   sixel/JXL graphics and reads the socket itself)
;
; cmd is capped at LEN_CMD (100 chars, sbbsdefs.h) in the runtime xtrn_t
; struct the C++ Terminal Server actually execs from -- install-xtrn.js
; itself writes ctrl/xtrn.ini as free-form text and does NOT enforce this,
; so an oversized cmd installs "successfully" but silently truncates (losing
; -c/the game id) the first time the BBS actually runs it. The door's own
; checkout path alone is well past that budget, so startup_dir below chdirs
; into the vendored scummvm/ tree (an ABSOLUTE path -- it has to cross from
; ctrl_dir's live tree to the checkout on a separate mount/filesystem, so a
; ctrl_dir-relative one, install-xtrn.js's own default, cannot reach it) and
; cmd stays relative to THAT, leaving ~20 chars of headroom.
;
; --path points at the door's own test fixture (src/doors/syncscumm/test/
; games/bass/, relative to startup_dir). No --extrapath: ScummVM's own
; non-release-build convenience (base/commandLine.cpp's ADD_DEFAULT_PATH)
; already defaults extrapath to "dists/engine-data/" relative to the CWD it
; is run from -- which IS startup_dir here, so it resolves to
; scummvm/dists/engine-data with no flag needed. (Relied upon rather than
; wired explicitly only because of the cmd-length budget above; a release
; build would need the flag back -- test/boot_bass.sh and test/boot_sixel.sh
; use the explicit SYNCSCUMM_DATA env var instead, which isn't available to
; an xtrn cmd line at all.)
;
; -c gives each user their own ScummVM config file under
; data/user/<####>/scumm/ -- the same parent DESIGN.md's save-dir convention
; (data/user/<####>/scumm/<gameid>/) uses, so per-user state stays under one
; recognizable subtree even though this task doesn't yet wire per-user save
; paths themselves (ScummVM's own F5 save dialog is unaffected either way).
; Needs a sixel- or JPEG-XL-capable terminal (SyncTERM).
; ---------------------------------------------------------------------------
[prog:SYNCSCUMM]
name          = SyncSCUMM (Beneath a Steel Sky)
startup_dir   = /home/rswindell/sbbs/src/doors/syncscumm/scummvm/
cmd           = ../build/scummvm %f --path=../test/games/bass -c %juser/%4/scumm/scummvm.ini sky
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the M2 live-test entry for SyncSCUMM: launches Beneath a Steel Sky directly, via DOOR32.SYS. Requires a sixel- or JPEG-XL-capable terminal (SyncTERM). This is a single fixed game for milestone testing -- the multi-game picker/installer ships in M5.
