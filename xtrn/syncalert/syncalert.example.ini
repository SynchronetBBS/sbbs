; syncalert.example.ini -- SyncAlert (Command & Conquer: Red Alert) door config
;
; To use: copy this file to "syncalert.ini" in this same directory (next to the
; syncalert binary) and edit the settings you want to change. Every setting is
; optional -- an absent file, section, or key falls back to the built-in
; default shown below, so you only need to list the ones you override.

[game]
; Full-motion video (FMV) cutscenes (intro, mission briefings, win/lose).
;   true  = always play them
;   false = never play them (skip straight to gameplay)
; Default (this key left absent/commented) is "auto": play the cutscenes only
; when the client can actually play audio -- a silent FMV is a poor experience
; and the heaviest thing the door sends over a terminal. Uncomment to force it.
;movies = true

[video]
; Differential "dirty-rectangle" rendering: each frame, re-send only the parts
; of the screen that actually changed (over the image the client still holds)
; instead of re-encoding the whole frame. Cuts bandwidth substantially -- most
; on a developed or mostly-static screen -- and never sends more than a full
; frame. Set to false if a particular terminal mis-composites the partial
; updates (seams or leftover pixels).
;dirty_rect = true

[idle]
; End the game when a player stops providing input, handing them back to the
; BBS. This does NOT drop the call -- the BBS's own inactivity timer takes over
; once they are back at a normal prompt.
;
; That BBS timer (SCFG's "Maximum Inactivity") cannot do this for a graphical
; door: it is reset by any socket traffic, and this door's frame pacing makes
; the terminal answer ~10x/second on its own, so it never fires here however it
; is configured.
;
; Both keyboard AND mouse count as being present -- mouse MOTION included, not
; just clicks -- so a player commanding units with the mouse never times out.
;
; A bare number is SECONDS; "15m" and "1h" also work. LEAVING THIS UNSET IS NOT
; THE SAME AS OFF: unset means the built-in default of 10 minutes. Set it to 0
; to disable idle detection entirely.
;timeout = 10m
; Countdown shown before exiting. Any input clears it and resets the clock; the
; input that answers the countdown is consumed, so it cannot also issue an order
; or open a menu.
;warn    = 60s
