; SyncAlert installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncalert
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncalert)

Name: SyncAlert
Desc: Command & Conquer: Red Alert for the BBS -- graphics, sound, skirmish vs the AI. Best on a sixel/JPEG-XL graphics terminal (e.g. SyncTERM), also playable on any ANSI/CP437/UTF-8 terminal via block characters; mouse supported.
By:   Rob Swindell / Westwood Studios / Vanilla Conquer
Cats: Games
Subs: Action, Strategy, Red Alert, RTS
Inst: 2026/07/07

; ---------------------------------------------------------------------------
; Single-player (skirmish vs the computer) Red Alert over DOOR32.SYS. A native
; executable with binary (untranslated) socket I/O: it emits DECSIXEL/JXL
; graphics and reads the client socket itself, fed the DOOR32.SYS drop file
; (%f) for the comm socket, user alias, and time left. Needs a SyncTERM-class
; sixel or JXL terminal (a text-tier fallback exists but RTS-on-text isn't a
; v1 usability promise -- see DESIGN.md).
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   graphics and reads the socket itself)
; The REDALERT.MIX/MAIN.MIX game data is located via the door's own argv/data-
; dir resolution (beside the binary, in an assets/ subdir -- see
; fetch-assets.js below), NOT via SCFG. -home gives each user their own
; storage dir for redalert.ini and savegames -- %juser/%4/redalert/ is
; data/user/<usernum>/redalert/, created on first run (mirrors SyncDuke/
; SyncDOOM). Without it, config/saves would be shared by every player.
; No lobby entry yet -- multiplayer (M3) plugs into this same DOOR32.SYS
; entry later; this is the direct single-player launcher only.
; ---------------------------------------------------------------------------
; Unlike SyncDuke/SyncDOOM (which fetch a prebuilt binary via a pre-exec
; script), SyncAlert has no downloadable binary to require here -- build it
; yourself first, then deploy it into this directory:
;   *nix:     src/doors/syncconquer/build.sh   then ./deploy.sh
;   Windows:  src/doors/syncconquer\build.bat  then deploy.bat  (MSVC/VS2022)
; The `cmd` line below uses %. for the platform's executable extension, so the
; same entry launches ./syncalert or syncalert.exe. There's no automated gate
; on any of this, so double-check the binary landed here (`ls syncalert` /
; `dir syncalert.exe`) before running this installer.
; ---------------------------------------------------------------------------
; XTRN_NODISPLAY: the door draws to the CLIENT's terminal and prints nothing
; locally (its diagnostics go to data/syncalert/syncalert_n<node>.log), so the
; BBS machine needs no console for it. On Windows this makes Synchronet spawn
; the door with CREATE_NO_WINDOW instead of CREATE_NEW_CONSOLE, so no console
; window ever appears -- not even the brief flash before the door closes its
; own. (The door also calls FreeConsole() at startup, since a DOOR32.SYS door
; can be run by a BBS that has no such setting; the two compose harmlessly.)
; On *nix it suppresses the local-display handling. Existing installs must set
; this by hand: SCFG -> External Programs -> <the door> -> Disable Local Display.
[prog:SYNCALERT]
name          = SyncAlert (Red Alert)
cmd           = syncalert%. %f -home %juser/%4/redalert/
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the single-player (skirmish vs the computer) launcher, via DOOR32.SYS. Requires a sixel- or JPEG-XL-capable terminal (SyncTERM) and the freeware RA95 game data (REDALERT.MIX/MAIN.MIX) -- the next step can download it into xtrn/syncalert/assets/ for you. SyncAlert ships no game data of its own.

; ---------------------------------------------------------------------------
; Optionally fetch the freeware Red Alert assets (RA95, released by EA as
; freeware 2008-08-31) so the door is playable out of the box. SyncAlert ships
; no game data -- fetch-assets.js downloads the official freeware CD image
; from archive.org, verifies its checksum, and extracts just the two MIX
; archives the engine needs (REDALERT.MIX + MAIN.MIX -- the FMV movies ride
; inside MAIN.MIX, so cutscenes play too) into
; xtrn/syncalert/assets/. Idempotent (skips assets already present) and
; non-fatal if it can't reach the internet -- you can always fetch it by hand
; later and re-run, or drop the MIX files in yourself.
;
; It must be a .js file: install-xtrn.js only executes JavaScript ([exec:] runs
; it via js.exec()), and a non-.js name is a hard error that aborts the install
; *after* the program list is built but *before* ctrl/xtrn.ini is written --
; i.e. the door silently fails to install.
; ---------------------------------------------------------------------------
[exec:fetch-assets.js]
note     = SyncAlert needs the freeware Red Alert (RA95) game data. It can be downloaded now (~556MB CD image, trimmed down to two MIX files afterward).
prompt   = Download and install the freeware RA95 game data now?
required = false
