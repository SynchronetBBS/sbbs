; SyncAlert installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncalert
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncalert)

Name: SyncAlert
Desc: Command & Conquer: Red Alert for the BBS -- graphics, sound, skirmish vs the AI
By:   Rob Swindell / Westwood Studios / Vanilla Conquer
Cats: Games
Subs: Action, Strategy, Red Alert, RTS
Inst: 2026/07/07

; ---------------------------------------------------------------------------
; Single-player (skirmish vs the computer) Red Alert over DOOR32.SYS. A native
; executable with binary (untranslated) socket I/O: it emits DECSIXEL/JXL
; graphics and reads the client socket itself, fed the DOOR32.SYS drop file
; (%f) for the comm socket, user alias, and time left. Needs a SyncTERM-class
; sixel or JXL terminal (a text-tier fallback exists but RTS-on-text isn't a
; v1 usability promise -- see DESIGN.md).
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   graphics and reads the socket itself)
; The REDALERT.MIX/MAIN.MIX game data is located via the door's own argv/data-
; dir resolution (beside the binary, in an assets/ subdir -- see
; fetch-assets.sh below), NOT via SCFG. -home gives each user their own
; storage dir for redalert.ini and savegames -- %juser/%4/alert/ is
; data/user/<usernum>/alert/, created on first run (mirrors SyncDuke/
; SyncDOOM). Without it, config/saves would be shared by every player.
; No lobby entry yet -- multiplayer (M3) plugs into this same DOOR32.SYS
; entry later; this is the direct single-player launcher only.
; ---------------------------------------------------------------------------
; Unlike SyncDuke/SyncDOOM (which fetch a prebuilt binary via a pre-exec
; script), SyncAlert has no downloadable binary to require here -- build it
; yourself first (src/doors/syncconquer/build.sh, then ./deploy.sh to copy
; the build output into this directory) on *nix; a Windows build isn't
; packaged. The [prog:SYNCALERT] note below says so; there's no automated
; gate on it, so double-check `ls syncalert` here succeeded before running
; this installer.
; ---------------------------------------------------------------------------
[prog:SYNCALERT]
name          = SyncAlert (Red Alert)
cmd           = syncalert%. %f -home %juser/%4/alert/
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the single-player (skirmish vs the computer) launcher, via DOOR32.SYS. Requires a sixel- or JPEG-XL-capable terminal (SyncTERM) and the freeware RA95 game data (REDALERT.MIX/MAIN.MIX) -- run xtrn/syncalert/fetch-assets.sh to install it into xtrn/syncalert/assets/. SyncAlert ships no game data of its own.

; ---------------------------------------------------------------------------
; Optionally fetch the freeware Red Alert assets (RA95, released by EA as
; freeware 2008-08-31) so the door is playable out of the box. SyncAlert ships
; no game data -- fetch-assets.sh downloads the official freeware CD image
; from archive.org, verifies its checksum, and extracts just the two MIX
; archives the engine needs (movies excluded -- v1 skips FMV anyway) into
; xtrn/syncalert/assets/. Idempotent (skips assets already present) and
; non-fatal if it can't reach the internet -- you can always fetch it by hand
; later and re-run, or drop the MIX files in yourself.
; ---------------------------------------------------------------------------
[exec:fetch-assets.sh]
note     = SyncAlert needs the freeware Red Alert (RA95) game data. It can be downloaded now (~556MB CD image, trimmed down to two MIX files afterward).
prompt   = Download and install the freeware RA95 game data now?
required = false
