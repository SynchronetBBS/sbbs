; syncrpg.ini -- sysop-facing settings for the SyncRPG (EasyRPG) door.
;
; This is the version-controlled TEMPLATE -- don't edit it in place. This
; package's install-xtrn.ini seeds a copy of it as syncrpg.ini in the package
; directory (the door's working directory, where the door reads it at launch).
; Edit the seeded syncrpg.ini, not this template, to change a default.
;
; The whole file is optional and every key has a sensible default, so an absent
; or unedited copy changes nothing. Every value is checked when the session
; starts, so a misspelled or out-of-range setting costs you the default, never
; the session. Only [input] menu_key and [video] resolution are the door's own;
; the rest are knobs of the shared termgfx layer used by every graphical door in
; this tree.
;
; NOTE: EasyRPG's own in-game F1 settings menu is deliberately unreachable in
; the door (it exposes key rebinding and debug tools that would escape per-user
; sandbox). The engine's other settings therefore come from its config.ini, kept
; per-user beside each player's saves -- never the global ~/.config/EasyRPG. The
; one engine setting the door surfaces directly is the game resolution, below.

; sixel_max -- override the sixel image ceiling (pixels), clamping BOTH axes to
; this one value. 0 or absent (the default) means no override: the door derives
; a ceiling from what the terminal reports. Set this only if a specific terminal
; misbehaves at the size the door would otherwise choose -- most sysops never
; need it.
;sixel_max = 0

[input]
; menu_key -- a Ctrl+<letter> hotkey that opens the door's help/about overlay,
; written as "ctrl-g" (any letter) or "off". F1 always opens the overlay
; regardless of this setting; this adds a second, terminal-independent way in
; for terminals that don't send F1 cleanly. Default: ctrl-g.
;menu_key = ctrl-g

[video]
; resolution -- the INITIAL game resolution:
;   original    320x240 (4:3)   -- the RPG Maker native size
;   widescreen  416x240 (16:9)  -- EasyRPG "fake resolution", experimental
;   ultrawide   560x240 (21:9)  -- EasyRPG "fake resolution", experimental
; The player changes it live at any time with F4 (cycles the three), and their
; choice is remembered for their next session (saved per-user, so it never
; affects anyone else) -- so this key is only the starting point for a player
; who has never pressed F4. The wide modes widen the visible play area; they are
; EasyRPG's own experimental modes and can glitch some games, and a game that
; forces its own resolution ignores the setting entirely. Ctrl-S shows the
; current resolution. Default: original.
;resolution = original

[idle]
; timeout -- disconnect a caller who has sent no input for this long. Accepts a
; bare number of seconds ("900"), or a suffixed duration ("15m", "1h"). 0
; disables the idle timer. Default: 10m.
;timeout = 10m

; warn -- seconds of on-screen countdown shown before an idle disconnect.
; Default: 60.
;warn = 60

[audio]
; enabled -- stream the game's sound to terminals that can play it (SyncTERM
; with libsndfile in the build). Terminals that cannot are unaffected: they
; stay silent. Default follows the terminal's reported audio capability.
;enabled = true

; volume -- how loud the sound is played in the player's terminal, 0 to 100.
; Applied on the terminal side, after decoding. To turn sound off use
; enabled = false rather than volume = 0.
;volume = 50

; quality -- Opus encode quality, 0.01 to 1.0. Higher sounds better and costs
; more uplink bandwidth. Default: 0.15.
;quality = 0.15

; chunk_ms -- milliseconds of audio per streamed chunk, 50 to 250. Longer
; chunks mean fewer seams and less overhead on the wire but a longer delay
; before a sound is first heard. "prebuffer" below counts CHUNKS, so the two
; multiply -- change both together to hold the delay steady. Default: 250.
;chunk_ms = 250

; prebuffer -- chunks buffered before playback starts, 2 to 8. This is the
; delay budget and the tolerance for a jittery link: the cushion is this times
; chunk_ms. Raise it on a link that stutters, at the cost of the sound running
; further behind the picture. Default: 3.
;prebuffer = 3

; channels -- sound channels sent to the terminal, 1 (mono) or 2 (stereo).
; Mono saves some uplink bandwidth; set 2 for a game that really places its
; music or effects left and right. Default: 2.
;channels = 2

; headroom -- how much of the loudness range the game's sound may use before
; it is compressed for sending, 1 to 100 (percent). Lower it if a game's
; loudest scenes crackle; most sysops never need to touch it. Default: 70.
;headroom = 70
