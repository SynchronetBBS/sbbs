; syncrpg.ini -- sysop-facing settings for the SyncRPG (EasyRPG) door.
;
; The door does NOT read this file yet -- as of the M4 (package/install) task
; it takes all of its configuration from its command line (see this package's
; install-xtrn.ini and README.md: --save-path is the only door-specific
; option; everything else is a plain EasyRPG argument, passed straight to
; Player::Init()). This template is seeded here as a placeholder for
; sysop-facing settings a later milestone may add (e.g. a menu-launch hotkey,
; forced video/audio tiers) -- deliberately deferred for now, so there is
; nothing to set. Installing this file changes nothing; it exists so a future
; option has somewhere to land without a fresh install step.
;
; SpiderMonkey / EasyRPG do not read Windows-style .ini comments beyond this
; header -- keep additions here in the same key = value shape the other
; sync* doors use (syncscumm.example.ini, syncmoo1.example.ini) once the door
; actually parses one.
