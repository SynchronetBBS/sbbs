; Yume Nikki (syncrpg) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncrpg
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncrpg)

Name: Yume Nikki
Desc: A freeware surreal exploration RPG, as a BBS door (EasyRPG Player)
By:   Kikiyama (game), EasyRPG team (engine)
Cats: Games
Subs: RPG
Inst: 2026/07/20

; ---------------------------------------------------------------------------
; The door itself: a native binary (the SyncRPG EasyRPG backend,
; src/doors/syncrpg) run with raw (binary) socket I/O, fed the DOOR32.SYS
; drop file (%f). Saves are per-user AND per-node-independent: --save-path
; points EasyRPG's FileFinder::Save() at data/user/<####>/yumenikki/ --
; EasyRPG's OWN command-line option (player.cpp), the same shape as
; ScummVM's --savepath in the syncscumm family, just without a separate -c
; config file: EasyRPG keeps no per-user ini distinct from its save tree, so
; two nodes never race one save slot.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (the door emits raw
;                  sixel/JXL graphics and reads the socket itself)
;   XTRN_MULTIUSER -- multiple nodes may run it at once
;   XTRN_NODISPLAY -- no local console window for the door on the BBS machine
;                  (the door draws to the CLIENT's terminal); a sysop who wants
;                  the window back turns it off in SCFG -> External Programs ->
;                  Yume Nikki -> Disable Local Display.
; startup_dir is intentionally left unset: install-xtrn.js then defaults it to
; THIS door directory, so the door runs with its own dir as CWD -- where
; getdata.js drops the game data (a yumenikki/ sub-tree, see below), where the
; deployed syncrpg binary lives (src/doors/syncrpg's build.sh + deploy.js), and
; where the door looks for an optional syncrpg.ini, seeded below from
; syncrpg.example.ini.
;
; The trailing "yumenikki" argument is the game's project-path, RELATIVE to
; startup_dir -- door/syncrpg.cpp takes the first argv token termgfx's I/O
; layer did not consume and hands it to EasyRPG as --project-path. getdata.js
; extracts the fetched archive keeping its own top-level yumenikki/ folder (the
; same layout test/boot_yumenikki.sh exercises in the source tree), so that
; folder name is exactly this package's own game-data subdirectory.
;
; cmd is capped at LEN_CMD (100 chars, sbbsdefs.h); this cmd is 54 chars --
; under budget, verified by hand.
; ---------------------------------------------------------------------------
[prog:YUMENIKKI]
name          = Yume Nikki
cmd           = syncrpg%. %f --save-path=%juser/%4/yumenikki yumenikki
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Yume Nikki door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed the door's OWN config from its template. syncrpg reads no options from
; it yet (the only settings the door currently takes come from its command
; line -- see README.md); the seeded copy is a placeholder for future
; sysop-facing settings (a menu-launch hotkey is deliberately deferred), so it
; changes nothing until the door grows something to read from it. Prompts
; before overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:syncrpg.example.ini]
dest = syncrpg.ini

; ---------------------------------------------------------------------------
; Game data: Yume Nikki is freeware, and rmarchiv.de (the EasyRPG project's own
; recommended archive) hosts the official English localization. getdata.js
; fetches it into this directory, verifying the archive against a pinned
; sha256 (via CryptContext's SHA-2 hash) before unpacking the RM2003 project
; tree (RPG_RT.ldb/.lmt/.ini + assets, under its own yumenikki/ folder). This
; is the SAME pinned fetcher src/doors/syncrpg/getdata.js uses for the
; source-tree's own headless boot test, adapted to drop its output HERE
; instead of test/games/ -- idempotent, safe to re-run; if
; yumenikki/RPG_RT.ldb is already present it is left alone.
;
; Wired as an [exec:] step (install-xtrn.js's [exec:] loop only accepts a
; ".js" file, and a shell/batch fetcher could not run on a Windows install
; anyway). Downloads over HTTPS via HTTPRequest.Download and extracts natively
; (the Archive object). Non-fatal (required = false): a failed or declined
; download still lets the install complete; re-run by hand any time:
;     jsexec ../xtrn/syncrpg/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Yume Nikki is freeware; getdata.js downloads the official English localization from rmarchiv.de over HTTPS and sha256-verifies it.
prompt   = Download the Yume Nikki game data now?
required = false
