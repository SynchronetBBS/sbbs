; Cascade Quest (cascadequest) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/cascadequest
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/cascadequest)

Name: Cascade Quest
Desc: A freeware SCI adventure by Phil Fortier, as a BBS door (ScummVM)
By:   Phil Fortier / Troflip (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/18

; ---------------------------------------------------------------------------
; LICENSING -- read before installing. Cascade Quest is an ORIGINAL adventure
; game by Phil Fortier ("Troflip"), built on Sierra's SCI interpreter but with
; its own story and art -- NOT built on Sierra's IP (contrast the spacequest0
; package). He released it as freeware on the SCI community site
; (sciprogramming.com); he has since made a commercial reboot, "Cascadia
; Quest" (Steam), so this free original is his older release. It carries no
; explicit redistribution grant of its own.
;
; Accordingly this package bundles NO game data: getdata.js downloads the ZIP
; from the author-community host at install time and unpacks it here (a
; git-ignored dir). Nothing is re-hosted in the Synchronet repository;
; sciprogramming.com is the distributor. Installing this door and running its
; getdata.js is the sysop's decision to serve it. If that is not wanted, do
; not install it.
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; The door: the native SyncSCUMM ScummVM backend (src/doors/syncscumm), raw
; (binary) socket I/O, DOOR32.SYS drop file (%f). Per-user, per-node saves:
; --savepath -> data/user/<####>/cascadequest/ and -c gives the same user
; their own scummvm.ini in that same dir. There is no "/saves" subdir: the
; per-user path is already unique per user AND per game, so the save files and
; scummvm.ini coexist there with no collision -- and dropping it keeps cmd
; under its length cap even with the full "cascadequest" name.
;   type = XTRN_DOOR32; XTRN_NATIVE, XTRN_BIN (raw sixel/JXL), XTRN_NODISPLAY
;   (no local console window; see the syncqueen package's identical note).
; startup_dir is left unset: install-xtrn.js defaults it to THIS door dir, so
; the door runs with its own dir as CWD -- where getdata.js drops the SCI
; resource files. No --path is given: door/syncscumm.cpp defaults --path to
; that startup dir and (finding no talkie/floppy subdir) uses it as-is, so
; ScummVM detects the SCI game right here.
;
; The trailing "sci-fanmade" is ScummVM's generic game id for a fan-made SCI
; game; ScummVM identifies the specific title (Cascade Quest) from the
; resource hashes under --path. The SCI engine that runs it was added to the
; ScummVM build alongside agi. cmd is capped at LEN_CMD (100 chars); this cmd
; is 96 chars -- under budget, verified by hand. Cascade Quest is an EGA,
; parser-driven SCI game (typed commands + arrow/keypad movement; SCI's menu
; bar handles the rest) -- keyboard-first, so no mouse or audio is required.
; ---------------------------------------------------------------------------
[prog:CASCADEQUEST]
name          = Cascade Quest
cmd           = scummvm%. %f --savepath=%juser/%4/cascadequest -c %juser/%4/cascadequest/scummvm.ini sci-fanmade
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Cascade Quest door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference scummvm.ini in THIS directory from the version-controlled
; template. cmd's -c actually points ScummVM at each user's OWN scummvm.ini
; under data/user/<####>/cascadequest/, created lazily on first launch; this step
; just gives the sysop a known-good template. Prompts before overwriting an
; edited copy.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Game data: getdata.js downloads CascadeQuest.zip from the author-community
; host over HTTPS, verifies its pinned sha256 + size, and unpacks only the SCI
; resource files here (see the LICENSING note above). Non-fatal (required =
; false): a declined or failed download still lets the install complete;
; re-run by hand any time:
;     jsexec ../xtrn/cascadequest/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Cascade Quest is a freeware fan game; getdata.js downloads it from the author-community host (sciprogramming.com) and sha256-verifies it. See the LICENSING note in this file.
prompt   = Download the Cascade Quest game data from sciprogramming.com now?
required = false
