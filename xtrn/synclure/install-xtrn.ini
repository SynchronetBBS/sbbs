; Lure of the Temptress (synclure) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/synclure
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/synclure)

Name: Lure of the Temptress
Desc: A freeware fantasy point-and-click adventure, as a BBS door (ScummVM). Requires a sixel-capable graphics terminal (e.g. SyncTERM); mouse supported.
By:   Revolution Software (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/19

; ---------------------------------------------------------------------------
; The door itself: a native binary (the SyncSCUMM ScummVM backend,
; src/doors/syncscumm) run with raw (binary) socket I/O, fed the DOOR32.SYS
; drop file (%f). Saves are per-user AND per-node-independent: --savepath
; points ScummVM's SavefileManager at data/user/<####>/lure/ and -c gives the
; same user their own scummvm.ini, so two nodes never race one save slot or one
; config file.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (the door emits raw
;                  sixel/JXL graphics and reads the socket itself)
;   XTRN_MULTIUSER -- multiple nodes may run it at once
;   XTRN_NODISPLAY -- no local console window for the door on the BBS machine
;                  (the door draws to the CLIENT's terminal); a sysop who wants
;                  the window back turns it off in SCFG -> External Programs ->
;                  Lure of the Temptress -> Disable Local Display.
; startup_dir is intentionally left unset: install-xtrn.js then defaults it to
; THIS door directory, so the door runs with its own dir as CWD -- where
; getdata.js drops the game data (Disk1.vga .. Disk4.vga), where lure.dat ships,
; and where the door looks for an optional syncscumm.ini (subtitles, sixel
; ceiling, audio, GMM hotkey), seeded below from syncscumm.example.ini.
;
; No --path is given. Like Beneath a Steel Sky and Drascula, Lure is a single
; flat build: door/syncscumm.cpp's main() defaults --path to this startup dir
; and, finding no ./talkie or ./floppy subdir, uses it as-is. ScummVM detects
; the game here as game id "lure" (the trailing argument below). Lure is a
; text/subtitle game with the engine's own music -- no speech track -- so audio
; rides the subtitles-auto default.
;
; The trailing "lure" is ScummVM's game id for Lure of the Temptress (verified
; with --detect: "lure:lure -- Lure of the Temptress (VGA/DOS/English)"). The
; lure engine was compiled into the SyncSCUMM build alongside
; scumm/sky/queen/drascula/agi/sci. cmd is capped at LEN_CMD (100 chars,
; sbbsdefs.h); this cmd is 75 chars -- under budget, verified by hand.
;
; The lure engine needs ScummVM's own lure.dat engine-data file, which is not
; part of the fetched game data (it belongs to ScummVM, not the game); it ships
; committed in this package dir and the door finds it via --path.
; ---------------------------------------------------------------------------
[prog:LURE]
name          = Lure of the Temptress
cmd           = syncscumm%. %f --savepath=%juser/%4/lure -c %juser/%4/lure/scummvm.ini lure
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Lure of the Temptress door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference copy of the ScummVM game configuration in THIS directory.
; cmd's -c actually points ScummVM at each user's OWN scummvm.ini, under
; data/user/<####>/lure/ -- a path that does not exist yet at install time, so
; ScummVM creates it lazily (from its own built-in defaults) the first time
; that user launches the door; this step cannot seed it directly. What it does
; instead: only the version-controlled template scummvm.example.ini is checked
; in, so the installer copies it to THIS directory's scummvm.ini, giving the
; sysop a known-good [lure] template. If scummvm.ini already exists here, the
; installer prompts before overwriting -- an edited copy is not clobbered.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Seed the door's OWN config from its template. Unlike scummvm.ini above
; (ScummVM's per-user config), syncscumm.ini is read by the door from THIS
; package dir at launch (subtitles, sixel ceiling, audio, GMM hotkey); the
; seeded copy holds only defaults, so it changes nothing until a sysop edits
; it. Prompts before overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:syncscumm.example.ini]
dest = syncscumm.ini

; ---------------------------------------------------------------------------
; Game data: Lure of the Temptress was released as freeware by Revolution
; Software, and ScummVM hosts it. getdata.js fetches it into this directory,
; verifying the archive against ScummVM's published .sha256 (via CryptContext's
; SHA-2 hash) before unpacking the VGA disk resources + LICENSE.txt. Idempotent
; -- safe to re-run; if Disk1.vga is already present it is left alone.
;
; Wired as an [exec:] step (install-xtrn.js's [exec:] loop only accepts a
; ".js" file, and a .sh could not run on a Windows install anyway). Downloads
; over HTTPS via HTTPRequest.Download and extracts natively (the Archive
; object). Non-fatal (required = false): a failed or declined download still
; lets the install complete; re-run by hand any time:
;     jsexec ../xtrn/synclure/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Lure of the Temptress is freeware; getdata.js downloads it from ScummVM's own hosting over HTTPS and sha256-verifies it.
prompt   = Download the Lure of the Temptress game data now?
required = false
