host = futureland.today
port = 10088
default_channel = main
max_history = 200
poll_delay_ms = 25
reconnect_delay_ms = 3000
input_max_length = 500

; ---------------------------------------------------------------------------
; IDLE ANIMATIONS
; ---------------------------------------------------------------------------
; When a user is idle (no keypress) for idle_timeout_seconds, background and
; foreground animations will start playing in the transcript area of the chat.
;
; Background animations (starfield, plasma, aurora, etc.) render BEHIND chat
; content — avatars and chat bubbles remain visible on top.  Foreground
; animations (figlet_message, avatars_float) render ABOVE chat content as
; floating transparent sprites.
;
; Any keypress immediately stops all animations and returns to normal chat.
;
; TIP: To disable idle animations entirely, set idle_enabled = false.
; TIP: To disable a specific animation, add its name to idle_disable.
; TIP: Animation names are case-sensitive; use the canonical names below.
; ---------------------------------------------------------------------------

; Master toggle — set to false to completely disable idle animations.
idle_enabled = true

; Seconds of inactivity before animations begin.
; TIP: 180 = 3 minutes.  Set lower (e.g. 30) for testing.
idle_timeout_seconds = 300

; Seconds each animation plays before switching to the next one.
idle_switch_interval = 60

; Frames per second for animation rendering.  Higher = smoother but heavier.
; TIP: 4-8 is a good range for BBS terminals.
idle_fps = 4

; true = pick animations randomly; false = play in sequence order.
idle_random = true

; Explicit play order (comma-separated).  Only used when idle_random = false.
; If omitted, all enabled animations are played in registration order.
; Available background animations:
;   tv_static, matrix_rain, life, starfield, fireflies, sine_wave,
;   comet_trails, plasma, fireworks, aurora, fire_smoke, ocean_ripple,
;   lissajous, lightning, tunnel
; Available foreground animations:
;   figlet_message, avatars_float
#idle_sequence = starfield, aurora, plasma, figlet_message, matrix_rain, life
; Comma-separated list of animation names to disable.
; TIP: To turn off a single flashy one, e.g.:  idle_disable = fireworks
;idle_disable =

; Clear the animation frame when switching to a new animation.
idle_clear_on_switch = true

; ---------------------------------------------------------------------------
; FIGLET MESSAGE SETTINGS
; ---------------------------------------------------------------------------
; The figlet_message animation renders large text using FIGlet/TheDraw fonts.
; It bounces around the transcript area like a screensaver.
;
; TIP: Use pipe (|) to separate multiple messages — one is picked at random.
; TIP: This is a great place to put your BBS name or tagline!
; ---------------------------------------------------------------------------

; Messages to display (pipe-separated).  Default: "Avatar Chat"
idle_figlet_messages = Avatar Chat

; Seconds between new message/font combos within the figlet animation.
idle_figlet_refresh = 30

; Comma-separated list of TheDraw font filenames to use.
; If empty, all available fonts are used.
;idle_figlet_fonts =

; Enable colour cycling on figlet text.  true/false.
idle_figlet_colors = true

; Enable bouncing movement.  Set false for static centered text.
idle_figlet_move = true

; ---------------------------------------------------------------------------
; AVATARS FLOAT SETTINGS
; ---------------------------------------------------------------------------
; The avatars_float animation shows user avatars drifting across the screen,
; greeting each other when they collide.  Requires avatar_lib.js.
; ---------------------------------------------------------------------------

; Use real user avatars from the BBS.  true/false.
idle_use_avatar_frames = true

; ---------------------------------------------------------------------------
; PER-ANIMATION TUNING (optional — sensible defaults are built in)
; ---------------------------------------------------------------------------
; These fine-tune individual background animations.  Most sysops can leave
; them commented out.  Uncomment and adjust if you want to tweak behaviour.
;
; idle_star_count = 180         ; Starfield: number of stars
; idle_aurora_speed = 0.12      ; Aurora: wave speed (0.05 - 0.3)
; idle_aurora_wave = 0.35       ; Aurora: wave amplitude
; idle_matrix_sparse = 4        ; MatrixRain: sparseness (higher = fewer cols)
; idle_plasma_speed = 0.18      ; Plasma: colour cycle speed
; idle_plasma_scale = 0.12      ; Plasma: pattern scale
; idle_tunnel_speed = 0.22      ; Tunnel: rotation speed
; idle_tunnel_scale = 0.17      ; Tunnel: depth scale
; idle_lissajous_speed = 0.12   ; Lissajous: curve speed
; idle_fire_decay = 1           ; FireSmoke: flame decay rate
; idle_ripple_count = 4         ; OceanRipple: max concurrent ripples
