Name: Avatar Chat
Desc: Avatar-enabled JSON chat client for Synchronet BBS
By:   Futureland contributors
Cats: Main, Communications, Messaging
Subs: Chat, Avatars, InterBBS, JavaScript
Inst: 2026/03/17

[prog:AVTCHAT]
cmd  = ?avatar_chat.js
settings = XTRN_MULTIUSER
required = true

[ini:avatar_chat.ini]
note = Leave the defaults to connect to the Futureland pre-alpha test server. Change them only if you plan to self-host or point at a different JSON chat service.
prompt = Configure Avatar Chat connection settings
keys = host,port,default_channel
values = 'futureland.today',10088,'main'
done = false

[service:JSON]
note = This is only needed if you want to host your own Avatar Chat backend. You can skip this if you plan to use the default Futureland test server.
prompt = Enable/install the Synchronet JSON service for self-hosting Avatar Chat?
Port = 10088
Options = STATIC | LOOP
Command = json-service.js
required = false
done = true
