; Space Quest 0: Replicated (spacequest0) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/spacequest0
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/spacequest0)

Name: Space Quest 0: Replicated
Desc: A freeware fan-made AGI adventure (Space Quest prequel), as a BBS door. Requires a sixel-capable graphics terminal (e.g. SyncTERM); mouse supported.
By:   Jeff Stewart (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/18

; ---------------------------------------------------------------------------
; LICENSING -- read before installing. Space Quest 0: Replicated is a FAN
; GAME (Jeff Stewart, 2003) built on Sierra's AGI interpreter and set in
; Sierra's Space Quest universe. It is NOT one of the officially-relicensed
; freeware titles (unlike Beneath a Steel Sky / Flight of the Amazon Queen).
; The author's page (https://www.wiw.org/~jess/replicated.html) grants no
; redistribution licence of its own and notes "Roger Wilco and related
; materials are (c) Sierra On-Line. Space Quest is a registered trademark."
;
; Accordingly this package bundles NO game data: getdata.js downloads the ZIP
; from the AUTHOR'S OWN host at install time and unpacks it here (a git-ignored
; dir). Nothing copyrighted is stored in the Synchronet repository; the
; author's site is the distributor. Installing this door and running its
; getdata.js is the sysop's decision to serve a fan game that builds on
; Sierra's IP. If that is not wanted, do not install it.
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; The door: the native SyncSCUMM ScummVM backend (src/doors/syncscumm) run
; with raw (binary) socket I/O, fed the DOOR32.SYS drop file (%f). Saves are
; per-user AND per-node-independent: --savepath points ScummVM's
; SavefileManager at data/user/<####>/spacequest0/ and -c gives the same
; user their own scummvm.ini.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (raw sixel/JXL out)
;   XTRN_NODISPLAY -- no local console window for the door (see the syncqueen
;                  package's note; identical rationale).
; startup_dir is left unset: install-xtrn.js defaults it to THIS door
; directory, so the door runs with its own dir as CWD -- where getdata.js drops
; the AGI game files. No --path is given: door/syncscumm.cpp defaults --path to
; that startup dir, and (finding no talkie/floppy subdir) uses it as-is, so
; ScummVM detects the AGI game right here. AGI is a keyboard/parser game --
; 16-color, no mouse or audio required.
;
; The trailing "sq0" is ScummVM's game id for this specific title (it detects
; the data as "Space Quest 0: Replicated"); the AGI engine that runs it was
; added to the ScummVM build alongside sci. cmd is capped at LEN_CMD (100
; chars, sbbsdefs.h); this cmd is 86 chars -- under budget, verified by hand.
; ---------------------------------------------------------------------------
[prog:SPACEQUEST0]
name          = Space Quest 0: Replicated
cmd           = syncscumm%. %f --savepath=%juser/%4/spacequest0 -c %juser/%4/spacequest0/scummvm.ini sq0
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Space Quest 0: Replicated door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference scummvm.ini in THIS directory from the version-controlled
; template. cmd's -c actually points ScummVM at each user's OWN scummvm.ini
; under data/user/<####>/spacequest0/, created lazily on first launch; this
; step just gives the sysop a known-good [sq0] template. Prompts before
; overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Seed the door's OWN config from its template. Unlike scummvm.ini above
; (ScummVM's per-user config), syncscumm.ini is read by the door from THIS
; package dir at launch (subtitles, sixel ceiling, audio); the seeded copy
; holds only defaults, so it changes nothing until a sysop edits it. Prompts
; before overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:syncscumm.example.ini]
dest = syncscumm.ini

; ---------------------------------------------------------------------------
; Game data: getdata.js downloads rep_104.zip from the author's host over
; HTTPS, verifies its pinned sha256 + size, and unpacks only the AGI game
; files here (see the LICENSING note above). Non-fatal (required = false): a
; declined or failed download still lets the install complete; re-run by hand
; any time:
;     jsexec ../xtrn/spacequest0/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Space Quest 0 is a fan game; getdata.js downloads it from the author's own host (wiw.org) and sha256-verifies it. See the LICENSING note in this file.
prompt   = Download the Space Quest 0: Replicated game data from the author's host now?
required = false
