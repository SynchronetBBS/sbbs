; ScummVM configuration template for the Space Quest 0: Replicated door.
;
; This is the version-controlled TEMPLATE -- don't edit it in place.
; install-xtrn.ini's [copy:] step copies it to THIS directory's scummvm.ini
; as a reference; the file ScummVM actually reads at runtime is each user's
; own copy under data/user/<####>/spacequest0/scummvm.ini (the -c argument),
; created from ScummVM's defaults the first time that user launches the door.
;
; No path=/savepath= here: the door defaults --path to its own directory and
; sets --savepath on its own command line. Keep this minimal; ScummVM fills in
; everything else itself. "sq0" is ScummVM's detected game id for this title.

[scummvm]
gui_return_to_launcher_at_exit=false

[sq0]
description=Space Quest 0: Replicated
gameid=sq0
