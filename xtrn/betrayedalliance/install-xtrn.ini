; Betrayed Alliance Book 1 (betrayedalliance) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/betrayedalliance
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/betrayedalliance)

Name: Betrayed Alliance Book 1
Desc: An MIT-licensed SCI adventure by Slattstudio, as a BBS door (ScummVM). Requires a sixel-capable graphics terminal (e.g. SyncTERM); mouse supported.
By:   Ryan Slattery / Slattstudio (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/19

; ---------------------------------------------------------------------------
; LICENSING -- the cleanest in this door family. Betrayed Alliance Book 1 is
; an ORIGINAL EGA, parser-driven SCI adventure by Ryan Slattery (Slattstudio),
; built on Sierra's SCI interpreter but with its own story and art -- not
; Sierra IP. It ships an explicit MIT LICENSE.TXT expressly permitting use,
; copying, publishing and redistribution, so unlike spacequest0 (Sierra IP)
; and cascadequest (no explicit grant) it could even be bundled. This package
; still fetches it rather than bundling -- lighter repo, always the pinned
; release -- from the author's own GitHub release; getdata.js keeps the MIT
; LICENSE.TXT with the game data to honor the notice clause.
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; The door: the native SyncSCUMM ScummVM backend (src/doors/syncscumm), raw
; (binary) socket I/O, DOOR32.SYS drop file (%f). Per-user, per-node saves:
; --savepath -> data/user/<####>/betrayed/ and -c gives the same user their
; own scummvm.ini in that dir. (The per-user dir is "betrayed", not the full
; "betrayedalliance": the fuller name would push cmd past its LEN_CMD 100-char
; cap once the "sci-fanmade" target is included.)
;   type = XTRN_DOOR32; XTRN_NATIVE, XTRN_BIN (raw sixel/JXL), XTRN_NODISPLAY
;   (no local console window; see the syncqueen package's identical note).
; startup_dir is left unset: install-xtrn.js defaults it to THIS door dir, so
; the door runs with its own dir as CWD -- where getdata.js drops the SCI
; resource files. No --path is given: door/syncscumm.cpp defaults --path to
; that startup dir and (finding no talkie/floppy subdir) uses it as-is, so
; ScummVM detects the SCI game right here.
;
; The trailing "sci-fanmade" is ScummVM's generic game id for a fan-made SCI
; game; ScummVM identifies the specific title (Betrayed Alliance 1.3.3.1) from
; the resource hashes under --path. The SCI engine that runs it was added to
; the ScummVM build alongside agi. cmd is capped at LEN_CMD (100 chars); this
; cmd is 90 chars -- under budget, verified by hand. Betrayed Alliance is an
; EGA, parser-driven SCI game (typed commands + arrow/keypad movement; SCI's
; menu bar handles the rest) -- keyboard-first, so no mouse or audio required.
; ---------------------------------------------------------------------------
[prog:BETRAYEDALLIANCE]
name          = Betrayed Alliance Book 1
cmd           = syncscumm%. %f --savepath=%juser/%4/betrayed -c %juser/%4/betrayed/scummvm.ini sci-fanmade
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Betrayed Alliance Book 1 door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference scummvm.ini (ScummVM's per-user config) in THIS directory
; from the version-controlled template. cmd's -c points ScummVM at each user's
; OWN scummvm.ini under data/user/<####>/betrayed/, created lazily on first
; launch; this just gives the sysop a known-good template. Prompts before
; overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Seed the door's OWN config from its template. Unlike scummvm.ini above
; (ScummVM's per-user config), syncscumm.ini is read by the door from THIS
; package dir at launch (subtitles, sixel ceiling, audio); the seeded copy
; holds only defaults, so it changes nothing until a sysop edits it. Prompts
; before overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:syncscumm.example.ini]
dest = syncscumm.ini

; ---------------------------------------------------------------------------
; Game data: getdata.js downloads the pinned release-v1.3.3.1 -minimal.zip
; from the author's GitHub over HTTPS, verifies its pinned sha256 + size, and
; unpacks only the SCI resource files + the MIT LICENSE.TXT here (see the
; LICENSING note above). Non-fatal (required = false): a declined or failed
; download still lets the install complete; re-run by hand any time:
;     jsexec ../xtrn/betrayedalliance/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Betrayed Alliance is an MIT-licensed freeware game; getdata.js downloads it from the author's GitHub release and sha256-verifies it. See the LICENSING note in this file.
prompt   = Download the Betrayed Alliance Book 1 game data from GitHub now?
required = false
