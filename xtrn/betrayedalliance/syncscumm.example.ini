; SyncSCUMM door configuration template (door-wide sysop settings).
;
; This is the version-controlled TEMPLATE -- don't edit it in place. Every
; SyncSCUMM title package (xtrn/<game>/) ships a copy of this file, and its
; install-xtrn.ini's [copy:] step seeds it as syncscumm.ini in the package
; directory -- the door's CWD, where door/syncscumm.cpp reads these settings
; at launch. Edit the seeded syncscumm.ini (not this template) to change a
; default. These settings are the same for every title (subtitles, sixel
; ceiling, audio), so they are configured per package; the values below are
; already the defaults, so an unedited copy changes nothing.

; subtitles -- superimpose dialogue text for games whose speech can't be
; heard. Precedence, highest first:
;   1. USER: if the player's own ScummVM config (the per-user file the door's
;      -c argument points at, under data/user/<####>/scumm/) already sets
;      "subtitles" itself -- in its target section or the global [scummvm]
;      section -- that value always wins and this key is never consulted.
;   2. SYSOP (this key): auto | on | off, case-insensitive.
;   3. AUTO: on when the player won't hear the game's sound, off when they
;      will. That means subtitles come on for a terminal that can't play
;      sound (and stay off for one that can) -- and also come on for every
;      session, whatever the terminal, when you turn sound off with the
;      "enabled" key in the [audio] section below.
; A missing file, a missing key, or an explicit "auto" here all mean the
; same thing: defer to step 3.
subtitles = auto

; sixel_max -- override the sixel image ceiling (pixels), clamping BOTH the
; width and height axes to this one value. 0 or absent (the default) means
; no override -- the door figures out a ceiling itself, in this order:
;   1. THIS key, if set -- always wins, no matter what the terminal reports.
;   2. The terminal's own XTSMGRAPHICS reply (ESC[?2;1S), when it answers --
;      the authoritative source, since the terminal told us its real limit.
;   3. Its exact reported pixel canvas (ESC[14t), trusted UNLESS the door
;      has positively identified the terminal as xterm (via XTVERSION) --
;      this is the common case for Windows Terminal and Foot, both of which
;      report an exact canvas but never answer XTSMGRAPHICS, and both
;      render sixels far larger than 1000x1000 just fine.
;   4. A conservative ~1000x1000 default otherwise -- notably, real xterm:
;      it reports a canvas too, but silently DISCARDS a sixel image whole
;      (not clipped) if its declared size exceeds this default, so its
;      canvas is deliberately NOT trusted the way WT/Foot's is.
; Set this only if a specific terminal misbehaves at the size the door
; would otherwise choose -- most sysops never need it.
sixel_max = 0

[audio]
; Stream the game's sound to terminals that can play it (SyncTERM with
; libsndfile). Terminals that cannot are unaffected: they stay silent and
; turn subtitles on automatically. Default: true.
;enabled = true

; Opus encode quality, 0.01 to 1.0. Higher costs uplink bandwidth.
; Default: 0.15.
;quality = 0.15

; How loud the sound is played in the player's terminal, 0 to 100.
; Default: 50 (about -6 dB). BASS streams the game's whole pre-mixed sound near
; unity, so at 100 it played noticeably louder than the other Synchronet doors
; (SyncDOOM, SyncDuke), which sit lower; 50 brings it into line. Raise it toward
; 100 for a louder BASS. The player can also trim it live with + / - in the
; game. To turn sound off, set enabled = false rather than volume = 0.
;
; This is the LAST step in the chain -- it is applied in the player's terminal,
; after the sound has been decoded. That matters if you are chasing distortion:
; turning this down makes a distorted scene quieter, but it cannot make it
; clean, because whatever damaged the sound already happened further upstream.
; The knob for that is "headroom" below, and it is where the roughly 3 dB this
; key used to hold back now lives instead. The two multiply, so the player hears
; the same loudness as before the move.
;volume = 50

; Headroom -- how much of the available loudness range the game's sound is
; allowed to use before it is compressed for sending, 1 to 100 (percent).
; Default: 70.
;
; What it is for: some scenes mix so loudly that the game's own sound is already
; squared off at maximum before this door ever sees it -- Beneath a Steel Sky's
; battle scene is the example. Compressing a sound that is pinned to the maximum
; makes the compressor overshoot it, and an overshoot at maximum has nowhere to
; go: it turns into a loud crackle that the game itself does not have. Scaling
; the sound down slightly first gives the overshoot somewhere to land, and the
; crackle disappears. On a test recording of that battle scene, the default of
; 70 takes it from about 2300 damaged samples to zero.
;
; This does NOT make the game quieter: the default "volume" above was raised
; from 70 to 100 by exactly the amount taken out here, so the two cancel and the
; player hears what they heard before. If you change one, consider the other.
;
; Raise it toward 100 for a game that never mixes that loudly and you want every
; last bit of quality; lower it if a game still crackles in its loudest scenes.
; Most sysops never need to touch it.
;headroom = 70

; Milliseconds of audio per streamed chunk, 50 to 250. Default: 250.
; The sound is sent as a series of separate pieces, and the seam between two
; pieces is where the faint click some players hear comes from. Longer pieces
; mean fewer seams per second and less per-piece overhead on the wire, so the
; default is the longest allowed: on a test recording, moving from 100 to 250
; cut the uplink from 158 to 110 kbps AND made the seams stop standing out
; from the sound around them. The cost is that a piece cannot be sent until it
; has filled, so lowering this shortens the delay before a sound is heard, at
; more bandwidth and more clicking.
;
; IMPORTANT: "prebuffer" below counts CHUNKS, so these two multiply. If you
; change this, change that one to keep their product near 750ms, or you will
; move the audio delay by much more than you meant to.
;chunk_ms = 250

; Sound channels sent to the terminal, 1 (mono) or 2 (stereo). Default: 2.
; Most of the games these engines run are from an era when the sound itself
; was mono -- the game produces one signal and it is simply played out of
; both speakers -- so sending one copy instead of two sounds identical and
; saves bandwidth. That is what 1 does, and it is worth trying on a thin
; uplink, but it saves about a quarter of the bandwidth rather than the half
; you would expect: the second copy is nearly free to compress precisely
; because it is a copy.
;
; It is not the default because at this sample rate mono currently makes the
; faint clicking between pieces WORSE, not better -- a quirk of how a mono
; stream is decoded here. So: 2 (the default) for the best sound, 1 to trade
; some clicking for about 25% less uplink. Either way, set 2 for a game that
; really does place its music or effects left and right, since 1 would throw
; that away.
;channels = 2

; Chunks buffered before playback starts, 2 to 8. This is the delay budget
; AND the entire tolerance for a jittery link. It counts CHUNKS, so the
; cushion is this times "chunk_ms" above: the defaults give 3 x 250ms, about
; 750ms. Raise it on a link that stutters, at the cost of the sound running
; further behind the picture. Default: 3.
;prebuffer = 3

; NOTE, if you set enabled = false: the "subtitles" key above, left on
; "auto", turns subtitles ON for every session -- including players on a
; terminal that could have played sound. "auto" asks whether the player will
; actually hear anything, and with sound off the answer is no for everyone,
; so a talkie game's dialogue is still read even though it is never heard.
; Set subtitles = on or off explicitly if you want to decide it yourself.
;
; Every value here is range-checked when the session starts, so an
; out-of-range or misspelled setting costs you the default, never the
; session.
