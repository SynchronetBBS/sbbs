; games.ini -- what MAME 2003-Plus never tells the frontend.
; Keyed by ROMSET NAME (the zip's basename). Everything but `name` is optional.
;
; MAME identifies a game BY the zip basename, so a romset can never be renamed
; to something readable -- the readable name lives here instead. A romset with
; no section is listed under its raw name, which is ugly but harmless.
;
; button.<id> names what a RetroPad button IS on this cabinet (<id> is one of
; B A Y X L R). The core sends no input descriptors, so this cannot be derived
; -- it is measured, with probe_core -hold. Label ALL of a cabinet's live
; buttons or none: the help screen hides the ones a labelled section omits.
; stick2 marks a twin-stick cabinet and labels its second stick.

