; SyncRetro -- Arcade installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncarcade
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncarcade)

Name: Arcade
Desc: Play arcade classics as a graphical BBS door (libretro / MAME 2003-Plus). Requires a sixel-capable graphics terminal (e.g. SyncTERM).
By:   Rob Swindell / MAME 2003-Plus (libretro core)
Cats: Games
Subs: Arcade, Retro, MAME
Inst: 2026/07/20

; ---------------------------------------------------------------------------
; The door itself is a native binary (src/doors/syncretro) that hosts the MAME
; 2003-Plus libretro core and renders it to the client's terminal. It is the SAME
; binary the Intellivision and NES doors use -- one door, many consoles -- so if
; you have installed either of those, you have already built it:
;   *nix:     cd src/doors/syncretro && ./build.sh
;   Windows:  src\doors\syncretro\build.bat
;   both:     jsexec src/doors/syncretro/deploy.js
; deploy.js installs the binary where the lobby looks for it: FLAT at the root on
; Windows (syncretro.exe / .dll never collide with a *nix host's names), or in an
; <os>-<arch> sub-dir on *nix (linux-x64/, linux-arm64/, darwin-arm64/, ...).
;
; NO BIOS IS NEEDED. Drop your romsets into roms/ and you are done. A few games
; need their PARENT romset present too (mspacman.zip resolves puckman.zip in a
; split set) -- that is just another zip in roms/, not a file to hunt down.
;
; ROMSETS ARE VERSION-SPECIFIC, and this is the one thing that surprises people.
; MAME 2003-Plus is built on MAME 0.78, so it wants romsets of that vintage. A
; newer collection mostly works -- 216 of 272 zips from a 2011-era set loaded in
; testing -- but the rest fail because MAME renamed the files INSIDE the zip
; between versions, or because the game was added to MAME after 0.78. The door
; tells the player which it was, rather than blaming the core. A romset manager
; (clrmamepro and friends) can rebuild a 0.78-compatible set from files you
; already have, for the first kind.
;
; The romsets are copyrighted content the SYSOP supplies; none are shipped.
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; The lobby: a menu to pick a game and play it. Runs the JS frontend (lobby.js),
; which spawns the native door itself via bbs.exec() -- with EX_NODISPLAY, so on
; Windows no local console window pops up per session (the door draws to the
; CLIENT's terminal; its own diagnostics are captured to
; data/syncretro/syncretro_n<node>.log). There is no separate direct-launch
; registration, because which game to run is the lobby's whole job.
; ---------------------------------------------------------------------------
[prog:SYNCARCADE]
name          = Arcade
cmd           = ?lobby
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the arcade door lobby (pick a game and play).

; ---------------------------------------------------------------------------
; Seed the live configuration. syncretro.ini holds THIS install's sysop settings
; ([audio], and which romsets to hide -- clones and vector games, mostly). Only
; the documented template syncretro.example.ini is version-controlled, so the
; installer copies it to syncretro.ini here. If syncretro.ini already exists the
; installer prompts before overwriting -- an edited config is not clobbered
; without confirmation.
; ---------------------------------------------------------------------------
[copy:syncretro.example.ini]
dest = syncretro.ini

; ---------------------------------------------------------------------------
; Optionally fetch the MAME 2003-Plus libretro core so the door is playable as
; soon as you supply romsets. getcore.js uses a copy already here or one you
; dropped in (a loose file or the buildbot .zip) and only downloads from the
; libretro buildbot when neither is present -- fetching the right build for this
; platform (Windows -> 32-bit windows/x86 .dll, since the door is Win32; *nix ->
; .so; macOS -> .dylib). Idempotent and non-fatal: it skips a core already
; present and never aborts the install if it can't reach the internet.
;
; NOTE the licence differs from the other SyncRetro cores: MAME 2003-Plus is
; under the MAME licence, not the GPL, and it restricts COMMERCIAL
; redistribution. This step downloads it for you; it does not redistribute it.
; A BBS that charges for access should read the licence.
; ---------------------------------------------------------------------------
[exec:getcore.js]
note     = SyncRetro needs the MAME 2003-Plus libretro core. It can be downloaded now (MAME licence, not GPL -- see README).
prompt   = Download the MAME 2003-Plus core now so the arcade door is ready to use?
required = false
