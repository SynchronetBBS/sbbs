; SyncRetro -- Arcade (MAME 2003-Plus).  TEMPLATE.
;
; The installer copies this to syncretro.ini, which is what the door and the
; lobby actually read.  Edit THAT file, not this one -- an upgrade overwrites
; this template, and never your syncretro.ini.
;
; WHAT IS AND IS NOT HERE: the console itself (its name, its core, its key
; bindings, what a romset looks like) is defined in lobby.js, not here -- it does
; not vary from install to install, and it is not a sysop's business. This file
; is the sysop's: the knobs that DO vary.
;
; [options] is the exception, and not by choice: core options belong to the
; console, but they cannot ride the door's command line (see that section), so
; they live here. Treat the two pinned there as part of the console.
;
; The door reads [audio], [video] and [options]; the lobby reads [roms]
; and [lobby].
; Display names for the picker live in names.json, beside this file.

[video]
; The SHAPE the picture is drawn at; see xtrn/syncnes/syncretro.example.ini for
; the full explanation of why a "correct" number can look wrong (it depends on
; the player's SyncTERM screen mode, which the door cannot see).
;
; UNSET ON PURPOSE HERE, unlike the NES install. An upright arcade game is
; already TALL -- Pac-Man is 224x288 -- and the pre-compensation that helps a
; landscape console is the wrong direction for a portrait picture. MAME also
; reports a usable aspect of its own per game, and it varies (a vertical cabinet
; and a horizontal one are not the same shape), so there is no single number to
; put here the way there is for one fixed console.
;
; Start with the core's own answer. If everything looks too narrow in SyncTERM's
; VGA modes, try 1.2; on a square-pixel client, leave it alone.
; aspect = core

; dirty_rect -- repaint only the parts of the picture that CHANGED, instead of
; re-sending the whole frame every time. The terminal is already holding the
; last frame and a sixel can be drawn at any character cell, so on a mostly
; static screen (a maze, a scoreboard, a play field with a few sprites) this
; sends the movement rather than the picture.
;
; Applies only where it is safe to omit the colour palette -- SyncTERM, which
; persists sixel colour registers between images. Every other terminal, and any
; frame where the palette changed, the image moved or resized, or a door screen
; painted over the game, falls back to a whole frame automatically.
;
; The Ctrl-S stats row shows "dr N%" -- the share of frames that were patched
; rather than repainted -- and the door logs a one-line summary on exit. Set
; false if you ever see stale or garbled patches; whole frames are always
; correct, and that is what the door did before this existed.
; dirty_rect = true

[audio]
; The player can change the volume in-game with '+' and '-' (10% a step), and
; the door SHOWS the new level on the bottom row. At 0 it sends no audio at all
; -- no encode, no upload, no queue.
;
; MAME 2003-Plus mixes at 48 kHz and the door takes the rate from the core, so
; there is nothing to set here. (Worth knowing WHY that works: the core derives
; its rate from a core option, and reports 0 Hz -- and plays silence -- to any
; frontend that does not answer its option queries. The door answers them.)
; enabled   = true
; quality   = 0.15
; volume    = 100
; chunk_ms  = 100
; prebuffer = 3

[options]
; libretro core options, passed to MAME 2003-Plus as `key = value`. Anything not
; listed keeps the core's own advertised default -- which the door hands back
; properly, and which matters more than it sounds: told NOTHING at all, this core
; reports a 0 Hz sample rate and plays no audio whatsoever.
;
; THEY LIVE HERE RATHER THAN ON THE DOOR'S COMMAND LINE because the BBS builds
; that command line in a 260-character buffer and truncates it without a word.
; The line is already ~240 characters for one game, and adding options to it cut
; the ROM argument off the end. The ini has no such limit.
;
; The two below skip MAME's copyright and warning screens. They are not
; cosmetic: a player who dialled in to play Pac-Man cannot meaningfully dismiss
; a legal notice, and without these he waits through both before the game.
mame2003-plus_skip_disclaimer = enabled
mame2003-plus_skip_warnings   = enabled
;
; Worth trying, not pinned: constrain an 8-way input to 4 directions for games
; built around a 4-way stick (Pac-Man, Dig Dug). Whether it feels better on a
; KEYBOARD is a judgement to make at a real terminal.
;mame2003-plus_four_way_emulation = enabled
;
; The door logs "core options: N advertised, N pinned, N read" at startup, and
; WARNS about any key here that this core does not advertise -- so a typo shows
; up in data/syncretro/syncretro_n<node>.log rather than silently doing nothing.

[roms]
; Directory holding romsets, relative to this file. Default: roms
dir = roms
; Extensions to consider, comma-separated. lobby.js defaults to zip, and there
; is no reason to change it: MAME reads romsets as .zip archives.
; ext = zip
;
; Case-insensitive substrings; any filename containing one is hidden. This is
; the useful knob for an arcade install, because a MAME romset collection is
; mostly things you do NOT want in a BBS picker:
;
;   - CLONES and BOOTLEGS. Every game has several ("puckmana", "puckmanf",
;     "pacmanbl", ...). The parent is the one to show.
;   - VECTOR games. Battlezone and Tempest render at 1024x768 -- twelve times
;     Pac-Man's pixel count -- and want a spinner or a dual stick besides. They
;     are the only romsets measured in a 272-game collection that are too big to
;     serve well over a terminal.
;
; There is no clever filter for the first one: MAME's parent/clone relationship
; is not visible in the filename. Hide what you do not want by name.
;
; exclude = bzone,tempest

[lobby]
; enter_sound -- play a one-shot sound once when a player enters the lobby, on a
; SyncTERM that can decode audio files (silent on any other terminal). A path to
; a WAV/OGG/FLAC/VOC file you supply (relative to this door's dir, or absolute)
; -- or a wildcard (e.g. sounds/*.wav) from which one match is chosen at random.
; Prefer OGG or WAV. Blank/unset = no entry sound.
;
; NOTHING ships here (don't redistribute copyrighted sound). An arcade game's
; sound is GENERATED by its sound hardware as the game runs, so it is nowhere in
; the romset as data and no tool can pull it out. Supply your own file.
;enter_sound = sounds/*.wav
