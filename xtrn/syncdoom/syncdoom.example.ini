; syncdoom.ini -- syncdoom door configuration
;
; Lives beside the syncdoom executable (located from the program's own path).
; All keys are optional; an absent key keeps the auto-detected value (from the
; terminal) or the built-in default. The matching command-line flags, where they
; exist, OVERRIDE these -- so the ini is the per-install default and the door's
; SCFG command line can still special-case it.

[video]

; tier -- which render tier to use. Default: auto-probe (JXL on SyncTERM > sixel
; on sixel-capable terminals > PPM > text). Force one with:
;   auto | text | jxl | sixel | ppm
;tier = auto

; scale -- how the graphics (JXL/sixel/PPM) tiers size the emitted image.
;   fit  : scale to fill the terminal's pixel viewport, preserving Doom's 8:5
;          aspect (small letterboxes are filled; near-square windows keep theirs).
;   off  : always emit the plain 640x400.
; Detail tops out at Doom's native 320x200 render, so a larger image is upscaled,
; not sharper -- "fit" trades bandwidth for screen coverage.
scale = fit

; scale_max -- cap on the emitted image WIDTH in pixels (a bandwidth guard for
; "scale = fit"). 0 = uncapped. Raise it to fill a large window more fully;
; lower it on a slow link.
scale_max = 1280

; frames_in_flight -- how many rendered frames may be "in flight" (sent but not
; yet confirmed by the terminal) at once. After each frame the door asks the
; terminal to report when it has drawn it, and won't exceed this many unconfirmed
; frames. Depth 1 paces strictly to the terminal: fine locally, but over a remote
; link the confirm round-trip IS the latency (RTT), so depth 1 caps the frame rate
; at ~1/RTT (a slideshow -- ~5 fps at 200 ms). A pipeline lets several frames cross
; the link at once; at ~150 ms RTT, depth 2-3 roughly 2-3x'd the frame rate.
;   auto (the default) -- adapt to the measured link: raise depth for latency, but
;     back OFF the instant the round-trip inflates above the link's baseline (frames
;     starting to queue), so it lifts remote frame rates WITHOUT the buffer-bloat
;     (laggy "input seconds behind") that a fixed-too-high depth causes. Safe to
;     leave on -- on a fast local link it simply settles at depth 1.
;   1..8 -- a fixed depth. Higher helps a far-away player (more frames in flight =
;     higher frame rate), but a fixed depth too high for the link will bloat; auto
;     avoids that. On a high-latency link, frame rate ~= depth / round-trip, so e.g.
;     depth 8 reaches Doom's 35fps cap at ~230ms; past that it only adds input lag.
; A player can also cycle this live in-game with Ctrl-T (1..8/auto, saved per-user)
; to A/B the feel. The exit telemetry logs the lag (current + baseline min) + depth.
frames_in_flight = auto

; jxl_distance -- JXL lossy Butteraugli target for the APC graphics tier, and
; the frame-size lever. 1.0 ~ visually lossless; higher = smaller frames + a
; softer image, at NO encode-time cost. Measured on Doom frames: ~-21% size at
; 3.0 and ~-36% at 4.0 vs the 2.0 default. Raise it on a slow link or if a
; terminal struggles with the frame volume. (Encode effort is fixed at 1 --
; raising it doesn't help this content and can hurt frame rate.)
;jxl_distance = 3.0

; cell_width / cell_height -- the terminal's character-cell size in PIXELS.
; Only needed for "scale = fit" graphics (JXL/sixel) on a terminal that does
; NOT answer the pixel-size probes (ESC[14t/16t/XTSMGRAPHICS) -- e.g. xterm with
; allowWindowOps off. The image is then sized to cols*cell_width x
; rows*cell_height. Measure as (window_pixels / chars): a 648x403 xterm showing
; 108x31 chars is ~6x13. SyncTERM and Windows Terminal answer the probes, so
; they don't need this. 0/unset = auto-estimate (~8x16).
;cell_width  = 6
;cell_height = 13

; charset -- text-tier glyph encoding. Default: auto from the terminal (UTF-8 ->
; the hi-res tiers, else CP437). Force with: cp437 | utf8
;charset = cp437

; colors -- color depth for the text tier. Default: auto from the terminal's TERM
; string. Force with: 16 | 256 | true
;colors = 256

; mode -- text sub-cell glyph tier (resolution vs. font coverage). Default: auto
; by charset (UTF-8 -> sextant, CP437 -> half). Force with:
;   half | quadrant | sextant | space
;mode = sextant

; -----------------------------------------------------------------------------
; NOTE: a player's in-game tweaks (the Options > Input sliders) are saved to a
; PER-USER syncdoom.ini in their -home dir, which overlays the matching
; [input]/[video] keys in THIS house-default file. CLI flags win
; over both.
; -----------------------------------------------------------------------------

[input]

; always_run -- start in always-run mode. A terminal can't reliably hold a run
; key (no key-up, one auto-repeating key at a time), so running by default plays
; far better than tapping the run key. The 'R' key toggles it at runtime either
; way. Set false to start walking. Default true.
always_run = true

; Key-up is synthesized after a key's last byte (terminals send key-DOWN only).
; These graces shape how movement "feels" (slidy vs. twitchy); the ideal depends
; on the player's OS key-repeat and link latency, so each player can also tune
; them live IN-GAME under the menu's Options > Input Feel (sliders for TAP/HOLD/
; TURN). The values below are the house DEFAULT; a player's in-game change is
; saved per-user (in their -home dir) and overrides it. All in milliseconds;
; raise on a laggy/jittery link.
;   kpsmooth : HOLD -- release grace once a key is clearly repeating (held) [150]
;   kpdelay  : TAP  -- release grace for a fresh press (the main "slidy" lever,
;                      bridges the OS repeat delay)                          [300]
;   kpturn   : TURN -- fresh grace for the turn keys, for tight aim taps     [150]
;kpsmooth = 150
;kpdelay  = 300
;kpturn   = 150

; [lobby] -- the optional JS lobby front-end (ignored by the door binary).

[lobby]
; attract -- show a full-screen DOOM ANSI splash once when a player enters the
; lobby (before the menu). A random *.ans/*.asc from art_dir is paged; any key
; drops into the menu. Silent if no art is installed. Default on. Set false to
; skip it entirely.
;attract = true
;
; art_dir -- where the attract art lives (blank/unset = an "art" sub-dir of the
; door dir). Relative paths resolve under the door dir; absolute used as-is.
; NOTE: no art ships here -- a sysop drops their own full-screen DOOM ANSI in
; (the classic ~48-row scene portraits page fine). Don't redistribute art you
; don't have the rights to.
;art_dir = art

; [net] -- multiplayer networking (read by the JS lobby).

[net]
; advertise -- the address joiners on OTHER hosts dial to reach games hosted
; here: a LAN IP or a public DNS name, written to the shared browse registry.
; For LAN cross-host play this is usually the only key you need: bind= (below)
; defaults to it, so the server both lists AND listens on that address. Blank
; advertise + blank bind = loopback (127.0.0.1) = same-host play only.
;
; bind -- the local address the dedicated server's UDP socket listens on.
; Blank inherits advertise= (the common case). Set it explicitly to override:
;   - 0.0.0.0  to listen on ALL interfaces;
;   - a specific local LAN IP, when advertise= is a public/NAT name this host
;     cannot bind directly (then advertise stays the public name peers dial).
; NOTE: the game protocol has no authentication -- once the server listens on a
; routable address, any host that can reach the UDP port and speaks the right
; Doom version/WAD can join. Restrict exposure with a host firewall.
;
; Shared multi-host install: a single syncdoom.ini is seen by every host, so a
; lone advertise=/bind= can't be right for all of them. Put each host's values in
; a [net:<hostname>] section instead -- <hostname> is that host's short hostname
; (Synchronet's system.local_host_name). Its keys overlay [net] for that host
; only, e.g. (bind inherits advertise on each):
;     [net:bbs-east]
;     advertise = 192.168.1.10
;     [net:bbs-west]
;     advertise = 192.168.1.11
advertise =
bind      =

; UDP port range allocated to per-match dedicated servers (one per match).
port_low  = 20000
port_high = 20063

; max_games   -- cap on concurrent matches on this system.
; max_players -- per-match ceiling (<= 4, Doom's MAXPLAYERS -- the game has only
;                4 player slots/colors/starts; the lobby clamps to 4 regardless).
max_games   = 8
max_players = 4

; idle_timeout -- seconds an empty match waits before the server self-quits.
idle_timeout = 60

; stale -- a game whose heartbeat is older than this many seconds is pruned
; from the browse list (its server is presumed dead).
stale = 30

; skill -- default difficulty the Create prompt starts on (1-5): 1 I'm Too Young
; To Die, 2 Hey Not Too Rough, 3 Hurt Me Plenty, 4 Ultra-Violence, 5 Nightmare!.
; The creator still picks per game; a [wadset:*] skill overrides this per set.
; 3 = Doom's own default. (Lobby matches autostart, so this replaces Doom's skill
; menu, which only appears in solo on a set with no map.)
skill = 3

; allow_external -- show the lobby's "Join an external server by address" option
; (manual host:port join of a server outside this system). Off by default;
; normal in-system joining is done via Browse. Set true to opt in.
;allow_external = true

; [wads] -- where WAD files live and how the picker is built (JS lobby).

[wads]
; dir -- WAD directory. Blank = the door's own directory (js.exec_dir).
; Relative paths are resolved under the door dir; absolute paths are used
; as-is (e.g. a shared collection).
dir = wads

; default -- the <id> of the [wadset:*] pre-selected in the picker / used by
; Solo when not prompting. freedoom1 is the free set the installer can fetch
; (see getwads.js), so it works out of the box; point this at doom2 (or another
; set) once you've supplied the commercial WADs. The lobby hides sets whose
; WAD files aren't installed, so a default pointing at a missing set just falls
; back to the first available one.
default = freedoom1

; [wadset:*] -- one playable WAD set per section (JS lobby picker). A valid
; Doom config is exactly one IWAD + zero-or-more PWADs. Keys:
;   name   display name (defaults to the <id> after "wadset:")
;   iwad   the base IWAD file (required)
;   pwad   comma-separated PWADs loaded with -file (order significant)
;   deh    comma-separated DeHackEd/BEX patches loaded with -deh
;   desc   one-line description
;   modes  where it may be used: solo, coop, deathmatch, altdeath (default all)
;   map    default starting map / -warp value
;   skill  default difficulty (1-5) the Create prompt starts on for this set;
;          overrides [net] skill (the creator can still change it per game)
;   maxplayers  default cap for this set (<= [net] max_players)
;   merge  comma-separated WADs merged via -merge (rare)
;   enabled  false to hide without deleting (default true)
;   note   caveat shown before launch
; A "<wadname>.msg" file beside a WAD in the set (e.g. sigil.msg next to sigil.wad)
; is shown, paged, before launch -- a long-form companion to "note".

[wadset:doom2]
name  = Doom II: Hell on Earth
iwad  = doom2.wad
desc  = The classic 32-level campaign
modes = solo, coop, deathmatch, altdeath

[wadset:doom]
name  = The Ultimate Doom
iwad  = doom.wad
desc  = The original four-episode shareware/registered Doom
modes = solo, coop, deathmatch, altdeath

[wadset:freedoom1]
name  = Freedoom: Phase 1
iwad  = freedoom1.wad
desc  = Free Ultimate-Doom-compatible IWAD (4 episodes)
modes = solo, coop, deathmatch, altdeath

[wadset:freedoom2]
name  = Freedoom: Phase 2
iwad  = freedoom2.wad
desc  = Free Doom II-compatible IWAD (ships freely)
modes = solo, coop, deathmatch, altdeath

[wadset:freedm]
name  = FreeDM
iwad  = freedm.wad
desc  = Free deathmatch IWAD (Freedoom project) -- DM arenas, no campaign
modes = deathmatch, altdeath
