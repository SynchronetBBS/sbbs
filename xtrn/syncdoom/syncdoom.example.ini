; syncdoom.ini -- syncdoom door configuration
;
; Lives beside the syncdoom executable (located from the program's own path).
; All keys are optional; an absent key keeps the auto-detected value (from the
; terminal) or the built-in default. The matching command-line flags, where they
; exist, OVERRIDE these -- so the ini is the per-install default and the door's
; SCFG command line can still special-case it.

[video]

; tier -- which render tier to use. Default: auto-probe (JXL on SyncTERM > sixel
; on sixel-capable terminals > PPM > text). Force one with:
;   auto | text | jxl | sixel | ppm
;tier = auto

; scale -- how the graphics (JXL/sixel/PPM) tiers size the emitted image.
;   fit  : scale to fill the terminal's pixel viewport, preserving Doom's 8:5
;          aspect (small letterboxes are filled; near-square windows keep theirs).
;   off  : always emit the plain 640x400.
; Detail tops out at Doom's native 320x200 render, so a larger image is upscaled,
; not sharper -- "fit" trades bandwidth for screen coverage.
scale = fit

; scale_max -- cap on the emitted image WIDTH in pixels (a bandwidth guard for
; "scale = fit"). 0 = uncapped. Raise it to fill a large window more fully;
; lower it on a slow link.
scale_max = 1280

; jxl_distance -- JXL lossy Butteraugli target for the APC graphics tier, and
; the frame-size lever. 1.0 ~ visually lossless; higher = smaller frames + a
; softer image, at NO encode-time cost. Measured on Doom frames: ~-21% size at
; 3.0 and ~-36% at 4.0 vs the 2.0 default. Raise it on a slow link or if a
; terminal struggles with the frame volume. (Encode effort is fixed at 1 --
; raising it doesn't help this content and can hurt frame rate.)
;jxl_distance = 3.0

; cell_width / cell_height -- the terminal's character-cell size in PIXELS.
; Only needed for "scale = fit" graphics (JXL/sixel) on a terminal that does
; NOT answer the pixel-size probes (ESC[14t/16t/XTSMGRAPHICS) -- e.g. xterm with
; allowWindowOps off. The image is then sized to cols*cell_width x
; rows*cell_height. Measure as (window_pixels / chars): a 648x403 xterm showing
; 108x31 chars is ~6x13. SyncTERM and Windows Terminal answer the probes, so
; they don't need this. 0/unset = auto-estimate (~8x16).
;cell_width  = 6
;cell_height = 13

; charset -- text-tier glyph encoding. Default: auto from the terminal (UTF-8 ->
; the hi-res tiers, else CP437). Force with: cp437 | utf8
;charset = cp437

; colors -- color depth for the text tier. Default: auto from the terminal's TERM
; string. Force with: 16 | 256 | true
;colors = 256

; mode -- text sub-cell glyph tier (resolution vs. font coverage). Default: auto
; by charset (UTF-8 -> sextant, CP437 -> half). Force with:
;   half | quadrant | sextant | space
;mode = sextant

[input]

; always_run -- start in always-run mode. A terminal can't reliably hold a run
; key (no key-up, one auto-repeating key at a time), so running by default plays
; far better than tapping the run key. The 'R' key toggles it at runtime either
; way. Set false to start walking. Default true.
always_run = true

; Key-up is synthesized after a key's last byte (terminals send key-DOWN only).
; All values in milliseconds; raise on a laggy/jittery link.
;   kpsmooth : release grace once a key is clearly repeating (held)   [150]
;   kpdelay  : release grace for a fresh press (bridges the OS repeat delay) [500]
;   kpturn   : fresh grace for the turn keys, for tight aim taps      [180]
;kpsmooth = 150
;kpdelay  = 500
;kpturn   = 180

; [net] -- multiplayer networking (read by the JS lobby).

[net]
; advertise -- the address joiners on OTHER hosts dial to reach games hosted
; here: a LAN IP or a public DNS name. The dedicated server binds all interfaces
; regardless; this is only the address written to the shared browse registry.
; Blank = loopback (127.0.0.1) = same-host play only.
;
; Shared multi-host install: a single syncdoom.ini is seen by every host, so a
; lone advertise= can't be right for all of them. Put each host's address in a
; [net:<hostname>] section instead -- <hostname> is that host's short hostname
; (Synchronet's system.local_host_name). Its keys overlay [net] for that host
; only, e.g.:
;     [net:bbs-east]
;     advertise = 192.168.1.10
;     [net:bbs-west]
;     advertise = 192.168.1.11
advertise =

; UDP port range allocated to per-match dedicated servers (one per match).
port_low  = 20000
port_high = 20063

; max_games   -- cap on concurrent matches on this system.
; max_players -- per-match ceiling (<= 4, Doom's MAXPLAYERS -- the game has only
;                4 player slots/colors/starts; the lobby clamps to 4 regardless).
max_games   = 8
max_players = 4

; idle_timeout -- seconds an empty match waits before the server self-quits.
idle_timeout = 60

; stale -- a game whose heartbeat is older than this many seconds is pruned
; from the browse list (its server is presumed dead).
stale = 30

; allow_external -- show the lobby's "Join an external server by address" option
; (manual host:port join of a server outside this system). Off by default;
; normal in-system joining is done via Browse. Set true to opt in.
;allow_external = true

; [wads] -- where WAD files live and how the picker is built (JS lobby).

[wads]
; dir -- WAD directory. Blank = the door's own directory (js.exec_dir).
; Relative paths are resolved under the door dir; absolute paths are used
; as-is (e.g. a shared collection).
dir = wads

; default -- the <id> of the [wadset:*] pre-selected in the picker / used by
; Solo when not prompting.
default = doom2

; [wadset:*] -- one playable WAD set per section (JS lobby picker). A valid
; Doom config is exactly one IWAD + zero-or-more PWADs. Keys:
;   name   display name (defaults to the <id> after "wadset:")
;   iwad   the base IWAD file (required)
;   pwad   comma-separated PWADs loaded with -file (order significant)
;   deh    comma-separated DeHackEd/BEX patches loaded with -deh
;   desc   one-line description
;   modes  where it may be used: solo, coop, deathmatch, altdeath (default all)
;   map    default starting map / -warp value
;   maxplayers  default cap for this set (<= [net] max_players)
;   merge  comma-separated WADs merged via -merge (rare)
;   enabled  false to hide without deleting (default true)
;   note   caveat shown before launch
; A "<wadname>.msg" file beside a WAD in the set (e.g. sigil.msg next to sigil.wad)
; is shown, paged, before launch -- a long-form companion to "note".

[wadset:doom2]
name  = Doom II: Hell on Earth
iwad  = doom2.wad
desc  = The classic 32-level campaign
modes = solo, coop, deathmatch, altdeath

[wadset:doom]
name  = The Ultimate Doom
iwad  = doom.wad
desc  = The original four-episode shareware/registered Doom
modes = solo, coop, deathmatch, altdeath

[wadset:freedoom1]
name  = Freedoom: Phase 1
iwad  = freedoom1.wad
desc  = Free Ultimate-Doom-compatible IWAD (4 episodes)
modes = solo, coop, deathmatch, altdeath

[wadset:freedoom2]
name  = Freedoom: Phase 2
iwad  = freedoom2.wad
desc  = Free Doom II-compatible IWAD (ships freely)
modes = solo, coop, deathmatch, altdeath

[wadset:freedm]
name  = FreeDM
iwad  = freedm.wad
desc  = Free deathmatch IWAD (Freedoom project) -- DM arenas, no campaign
modes = deathmatch, altdeath
