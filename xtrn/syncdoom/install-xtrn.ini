; SyncDOOM installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncdoom
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncdoom)
;
; Two ways to install SyncDOOM -- the installer prompts for each, so you can
; take the lobby, the direct single-player launcher, or both.

Name: SyncDOOM
Desc: Multiplayer DOOM for the BBS -- SyncTERM graphics, co-op & deathmatch
By:   Rob Swindell / id Software
Cats: Games
Subs: Action, Doom, Multiplayer
Inst: 2026/06/17

; ---------------------------------------------------------------------------
; The lobby (recommended): a menu to browse/create co-op & deathmatch network
; games, play single-player, or read the controls -- runs the JS frontend,
; which spawns the door itself (no DOOR32.SYS involved).
; ---------------------------------------------------------------------------
[prog:SYNCDOOM]
name          = SyncDOOM
cmd           = ?lobby
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the SyncDOOM lobby (browse/create co-op & deathmatch games, single-player, controls help).

; ---------------------------------------------------------------------------
; Direct single-player launch (no lobby): drop straight into Doom. Uses the
; DOOR32.SYS drop file (%f) for the session, a per-user home for config + saves
; (data/user/<num>/doom/, same place the lobby uses), and a fixed IWAD.
; ---------------------------------------------------------------------------
[prog:SYNCDOOMSP]
name          = SyncDOOM (single-player)
cmd           = syncdoom%. %f -l%R -home %juser/%4/doom/ -iwad freedoom1.wad
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install a direct single-player launcher (no lobby), via DOOR32.SYS.
