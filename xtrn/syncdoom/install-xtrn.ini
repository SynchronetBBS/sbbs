; SyncDOOM installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncdoom
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncdoom)
;
; Two ways to install SyncDOOM -- the installer prompts for each, so you can
; take the lobby, the direct single-player launcher, or both.

Name: SyncDOOM
Desc: Multiplayer DOOM for the BBS -- graphics, co-op & deathmatch. Requires a sixel-capable graphics terminal (e.g. SyncTERM); mouse optional.
By:   Rob Swindell / id Software
Cats: Games
Subs: Action, Doom, Multiplayer
Inst: 2026/06/17

; ---------------------------------------------------------------------------
; Require the door's executable BEFORE registering it. SyncDOOM's binary is not
; shipped in the Synchronet package; get-binary.js fetches it on Windows (from a
; well-known URL on Vertrauen) or, on *nix, verifies build.sh/deploy.sh have put
; it here. required=true -> the install aborts if the binary is still missing.
; ---------------------------------------------------------------------------
[pre-exec:get-binary.js]
required = true

; ---------------------------------------------------------------------------
; The lobby (recommended): a menu to browse/create co-op & deathmatch network
; games, play single-player, or read the controls -- runs the JS frontend,
; which spawns the door itself (no DOOR32.SYS involved).
; ---------------------------------------------------------------------------
[prog:SYNCDOOM_LOBBY]
name          = SyncDOOM
cmd           = ?lobby
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the SyncDOOM lobby (browse/create co-op & deathmatch games, single-player, controls help).

; ---------------------------------------------------------------------------
; Direct single-player launch (no lobby): drop straight into Doom. A native
; executable run with binary (untranslated) socket I/O, fed the DOOR32.SYS drop
; file (%f) for the comm socket + time left, a per-user home for config + saves
; (data/user/<num>/doom/, same place the lobby uses), and a fixed IWAD. No -l/%R:
; the door auto-detects the screen size (live terminal probe, then the node's
; terminal.ini, which sits beside the drop file).
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   graphics/CP437 and reads the socket itself)
;   XTRN_NODISPLAY -- no local console window for the door. The door draws to
;                   the CLIENT's terminal; on Windows, Synchronet would
;                   otherwise spawn it with CREATE_NEW_CONSOLE and pop up a
;                   console window on the BBS machine for every session
;                   (sbbs3/xtrn.cpp). The door's diagnostics are recorded to
;                   data/syncdoom/syncdoom_n<node>.log ([debug] log, on by
;                   default), so nothing is lost by hiding it. A sysop who
;                   wants the window back turns this off in SCFG -> External
;                   Programs -> <the door> -> Disable Local Display.
;                   (Existing installs keep their current flags -- this only
;                   affects a fresh install-xtrn run.)
; ---------------------------------------------------------------------------
[prog:SYNCDOOM]
name          = SyncDOOM (single-player)
cmd           = syncdoom%. %f -home %juser/%4/doom/ -iwad freedoom1.wad
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install a direct single-player launcher (no lobby), via DOOR32.SYS.

; ---------------------------------------------------------------------------
; Seed the live configuration. syncdoom.ini is the door + lobby's per-install
; settings file (video/input for the door; net/wads/wadset:* for the lobby);
; only the documented template syncdoom.example.ini is version-controlled, so
; the installer copies it to syncdoom.ini here. If syncdoom.ini already exists,
; the installer prompts before overwriting -- a sysop's edited config is not
; clobbered without confirmation.
; ---------------------------------------------------------------------------
[copy:syncdoom.example.ini]
dest = syncdoom.ini

; ---------------------------------------------------------------------------
; Optionally fetch the free Freedoom WAD set so the door is playable out of the
; box. SyncDOOM ships no game data -- the commercial doom.wad/doom2.wad you must
; supply yourself, but Freedoom (Phase 1 + 2) and FreeDM are freely
; redistributable, so getwads.js downloads them into the [wads] dir (default
; wads/). Idempotent (skips WADs already present) and non-fatal if it can't
; reach the internet -- you can always add WADs by hand. Runs after the config
; copy above so it can read the [wads] dir from syncdoom.ini.
; ---------------------------------------------------------------------------
[exec:getwads.js]
note     = SyncDOOM needs DOOM WAD files. Freedoom (free, GPL-compatible) can be downloaded now.
prompt   = Download the free Freedoom WAD set now (~35 MB) so SyncDOOM is playable out of the box?
required = false