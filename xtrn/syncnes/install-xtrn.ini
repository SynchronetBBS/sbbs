; SyncRetro -- NES installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncnes
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncnes)

Name: Nintendo Entertainment System
Desc: Play NES cartridges as a graphical BBS door (libretro / FCEUmm). Requires a sixel-capable graphics terminal (e.g. SyncTERM).
By:   Rob Swindell / FCEUmm (libretro core)
Cats: Games
Subs: Arcade, Retro, NES, Nintendo
Inst: 2026/07/11

; ---------------------------------------------------------------------------
; The door itself is a native binary (src/doors/syncretro) that hosts the FCEUmm
; libretro core and renders it to the client's terminal. It is the SAME binary
; the Intellivision door (xtrn/syncivision) uses -- one door, many consoles -- so
; if you have already installed that one, you have already built it:
;   *nix:     cd src/doors/syncretro && ./build.sh
;   Windows:  src\doors\syncretro\build.bat
;   both:     jsexec src/doors/syncretro/deploy.js
; deploy.js installs the binary where the lobby looks for it: FLAT at the root on
; Windows (syncretro.exe / .dll never collide with a *nix host's names), or in an
; <os>-<arch> sub-dir on *nix (linux-x64/, linux-arm64/, darwin-arm64/, ...).
;
; NO BIOS IS NEEDED. Unlike the Intellivision, an NES boots from the cartridge
; alone. Drop your cartridges into roms/ and you are done. (The one exception is
; Famicom Disk System .fds images, which need disksys.rom -- see syncretro.ini.)
; The cartridges are copyrighted content the SYSOP supplies; none are shipped.
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; The lobby: a menu to pick a cartridge and play it. Runs the JS frontend
; (lobby.js), which spawns the native door itself via bbs.exec() -- with
; EX_NODISPLAY, so on Windows no local console window pops up per session (the
; door draws to the CLIENT's terminal; its own diagnostics are captured to
; data/syncretro/syncretro_n<node>.log). There is no separate direct-launch
; registration, because which cartridge to run is the lobby's whole job.
; ---------------------------------------------------------------------------
[prog:SYNCNES]
name          = Nintendo Entertainment System
cmd           = ?lobby
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the NES door lobby (pick a cartridge and play).

; ---------------------------------------------------------------------------
; Seed the live configuration. syncretro.ini holds THIS install's sysop settings
; ([audio], and which ROMs to hide). Only the documented template
; syncretro.example.ini is version-controlled, so the installer copies it to
; syncretro.ini here. If syncretro.ini already exists the installer prompts before
; overwriting -- an edited config is not clobbered without confirmation.
; ---------------------------------------------------------------------------
[copy:syncretro.example.ini]
dest = syncretro.ini

; ---------------------------------------------------------------------------
; Optionally fetch the FCEUmm libretro core so the door is playable out of the
; box. FCEUmm is GPLv2 (freely redistributable), unlike the cartridges, so
; getcore.js can install it automatically: it uses a copy already here or one you
; dropped in (a loose file or the buildbot .zip) and only downloads from the
; libretro buildbot when neither is present -- fetching the right build for this
; platform (Windows -> 32-bit windows/x86 .dll, since the door is Win32; *nix ->
; .so; macOS -> .dylib). Idempotent and non-fatal: it skips a core already
; present and never aborts the install if it can't reach the internet -- you can
; always drop the core in by hand.
; ---------------------------------------------------------------------------
[exec:getcore.js]
note     = SyncRetro needs the FCEUmm libretro core. It is free (GPLv2) and can be downloaded now.
prompt   = Download the FCEUmm core now so the NES door is playable out of the box?
required = false

; ---------------------------------------------------------------------------
; Optionally fetch freely-licensed NES homebrew, so the door has games in it
; before you supply a single cartridge. Every game it installs was published by
; its AUTHOR under a free licence (LGPL, GPL, MIT, zlib or Creative Commons) --
; the Mojon Twins' platformers, NovaSquirrel's games, Damian Yerrick's, and
; others; see README.md for the full credits. Nothing commercial is fetched, and
; the great majority of NES homebrew, which states no licence at all, is
; deliberately NOT on the list.
;
; Each ROM is pinned by URL, size and MD5 and verified after download, so a file
; that changed upstream is rejected rather than installed. Idempotent and
; non-fatal: it skips what is already there, never overwrites a ROM you edited,
; and a failed download never aborts the install.
; ---------------------------------------------------------------------------
[exec:getroms.js]
note     = SyncNES can install 20 freely-licensed homebrew games (about 1.4 MB) so the door is playable immediately.
prompt   = Download the free homebrew NES games now?
required = false
