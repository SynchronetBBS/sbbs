; SyncRetro -- Nintendo Entertainment System.  TEMPLATE.
;
; The installer copies this to syncretro.ini, which is what the door and the
; lobby actually read.  Edit THAT file, not this one -- an upgrade overwrites
; this template, and never your syncretro.ini.
;
; WHAT IS AND IS NOT HERE: the console itself (its name, its core, its key
; bindings, what a cartridge looks like) is defined in lobby.js, not here -- it
; does not vary from install to install, and it is not a sysop's business. This
; file is the sysop's: the knobs that DO vary.
;
; The door reads [audio] and [video]; the lobby reads [roms] and [lobby].

[video]
; The SHAPE the picture is drawn at. A console's pixels are NOT square: the NES's
; 256x240 framebuffer was shown on a 4:3 television, so drawing it at 256:240
; (1.067) makes it a quarter too narrow.
;
;   core     what the core asks for -- the NES's 1.219 (the 8:7 pixel-aspect
;            convention). Matches every other libretro frontend. THE DEFAULT.
;   4:3      what a television actually showed (1.333). Wider than the NES's
;            reported 1.219; many prefer it, and it is arguably the more honest
;            number for a CRT-era console.
;   square   the raw framebuffer, unstretched. The door's behavior before M3.
;   <number> anything you like, e.g. 1.25
;
; The door LOGS the aspect it settled on at startup, so a key in the wrong
; section (or a typo) is visible rather than silently ignored.
;
; aspect = core
;
; ----------------------------------------------------------------------------
; THE TERMINAL IS HALF THE EQUATION, AND IT IS WHY THE "CORRECT" NUMBER CAN LOOK
; WRONG.
;
; The door emits pixels. Whether those pixels are SQUARE when they reach the eye
; is the TERMINAL's decision, not the door's -- and it depends on the screen mode
; the player picked. SyncTERM's classic VGA modes ("80x25") are the mode 13h shape:
; a 640x400 canvas shown as a 4:3 picture, so every canvas pixel is 1.3333/1.6 =
; 0.8333 as wide as it is tall, and every image the door draws is squeezed
; horizontally by that factor before anyone sees it. The "LCD 80x25" modes are the
; square-pixel variants, and squeeze nothing.
;
; The door cannot compensate. It can tell that it is talking to SyncTERM, but not
; which screen mode the player chose, so no single number is right for both. Pick
; for YOUR clients -- and the BBS default is the VGA one.
;
; Measured, on the Dr. Mario title screen -- whose checkerboard is drawn from
; square NES tiles, so its shape on screen IS the pixel shape:
;
;   screen mode                      NES pixel   picture    verdict
;   ---------------------------------------------------------------------------
;   SyncTERM "80x25" (VGA,             1.178      1.250     right, to within a
;     rectangular pixels)                                   few percent
;   SyncTERM "LCD 80x25", Windows      1.403      1.500     12-23% too wide
;     Terminal (square pixels)
;
;   for reference, a real NES is 1.143 pixels / 1.219 picture (the 8:7
;   convention), or 1.250 pixels / 1.333 picture (a 4:3 television).
;
; So in the VGA modes `aspect = 1.5` PRE-COMPENSATES for the 0.8333 squeeze and
; lands between the two references -- which is why it looks right there, and why
; the "correct" 4:3 looks too NARROW: 1.333 x 0.8333 = 1.111, nearly square.
;
;   exact 4:3 television in SyncTERM's VGA modes:   aspect = 1.6  (x 0.8333 = 1.333)
;   exact 4:3 television on a square-pixel client:  aspect = 4:3
;
; The same arithmetic is why the Intellivision needs no setting at all: FreeIntv's
; native 352x224 is 1.571, and the VGA squeeze turns that into 1.31 -- the 4:3 that
; console really output.
;
; DEFAULTED TO 1.5 rather than `core`, because `core` (the NES's 1.219) comes out
; at 1.219 x 0.8333 = 1.016 in the VGA modes: essentially square, and visibly wrong
; for most of the people who will dial in.
aspect = 1.5

; dirty_rect -- repaint only the parts of the picture that CHANGED, instead of
; re-sending the whole frame every time. The terminal is already holding the
; last frame and a sixel can be drawn at any character cell, so a mostly static
; screen sends the movement rather than the picture. How much it wins depends
; entirely on the game: a fixed play field with a few sprites gains a great
; deal, a scrolling or full-screen-animated one little or nothing (and falls
; back to whole frames by itself).
;
; Applies only where the colour palette can safely be omitted -- SyncTERM, which
; persists sixel colour registers between images. Every other terminal, and any
; frame where the palette changed, the image moved or resized, or a door screen
; painted over the game, sends a whole frame automatically.
;
; The Ctrl-S stats row shows "dr N%" -- the share of frames patched rather than
; repainted -- and the door logs a one-line video summary on exit. Set false if
; you ever see stale or garbled patches; whole frames are always correct, and
; are what the door did before this existed.
; dirty_rect = true

[audio]
; The player can change the volume in-game with '+' and '-' (10% a step), and
; the door SHOWS the new level on the bottom row. At 0 it sends no audio at all
; -- no encode, no upload, no queue -- so a player who wants quiet costs zero
; bandwidth rather than streaming Opus his terminal would discard. `volume` here
; is only the level he STARTS at.
; The core's audio, streamed to SyncTERM as Opus chunks. The NES mixes at
; 48 kHz (the Intellivision at 44.1); the door takes the rate from the core, so
; there is nothing to set here.
; enabled   = true
; quality   = 0.15
; volume    = 100
; chunk_ms  = 100
; prebuffer = 3

[roms]
; Directory holding cartridges, relative to this file. Default: roms
dir = roms
; Extensions to consider, comma-separated. lobby.js defaults to nes,unf,unif.
;
; .fds (Famicom Disk System) is NOT included by default: an FDS image needs the
; disksys.rom BIOS in this directory, which is copyrighted content you must
; supply. If you have it, drop it here and uncomment:
; ext = nes,unf,unif,fds
;
; Case-insensitive substrings; any filename containing one is hidden.
exclude =

[lobby]
; enter_sound -- play a one-shot sound once when a player enters the lobby, on a
; SyncTERM that can decode audio files (silent on any other terminal). A path to a
; WAV/OGG/FLAC/VOC file you supply (relative to this door's dir, or absolute) -- or
; a wildcard (e.g. sounds/*.wav) from which one match is chosen at random each
; entry. Prefer OGG or WAV: those decode everywhere, MP3 needs a newer libsndfile
; on the player's end. Blank/unset = no entry sound.
;
; NOTHING ships here (don't redistribute copyrighted sound). SyncDuke and SyncDOOM
; suggest extracting a sound from your own GRP or WAD; there is no equivalent for a
; cartridge. A console's sound is GENERATED by its sound chip as the game runs --
; the NES's APU, the Intellivision's AY-3-8910 -- so it is nowhere in the ROM as
; data, and no tool can pull it out. Supply your own file.
;enter_sound = sounds/*.wav
