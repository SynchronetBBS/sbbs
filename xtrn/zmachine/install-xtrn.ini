; Synchronet Z-Machine installer data for install-xtrn.js
;
; Install from the command line:   jsexec install-xtrn ../xtrn/zmachine
; or from the terminal (as sysop):  ;exec ?install-xtrn ../xtrn/zmachine

Name: Synchronet Z-Machine
Desc: Play Z-machine interactive fiction (v3/4/5/8) - Infocom classics and modern IF
By:   Rob Swindell, zzo38 (JSZM interpreter), David Lehenbauer (jszm)
Cats: Games
Subs: Adventure, Interactive Fiction, Classic, JavaScript
Inst: 2026/06/02

[prog:ZMACHINE]
name = Synchronet Z-Machine
cmd  = ?zmachine
settings = XTRN_MULTIUSER
required = true
note = Plays Z-machine interactive fiction (Infocom classics + modern IF).

; Provision tested story files: verify the bundled Zork I/II/III, and offer to
; download more (incl. Arthur with v6 graphics) one at a time. Idempotent and
; non-fatal -- re-runnable any time with: jsexec ../xtrn/zmachine/getgames.js
[exec:getgames.js]
note     = The door bundles Zork I/II/III. Other tested games -- including Arthur with v6 graphics -- can be installed now.
prompt   = Set up bundled games and optionally download more (incl. Arthur) now?
required = false
