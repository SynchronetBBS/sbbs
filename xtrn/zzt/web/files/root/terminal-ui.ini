; ZZT web terminal bridge options
; This file is read by: ./root/api/terminal-ui-config.ssjs
;
; Notes:
; - lock_screen_size=true forces fixed rows/columns and ignores browser resize.
; - allow_resize is supported as an alias (inverse of lock_screen_size).
; - When lock_screen_size=false, min/max rows/columns control auto-fit bounds.

[terminal]
; Set true to force fixed terminal dimensions for all users.
lock_screen_size = false
; Alias for convenience. If lock_screen_size is set, it takes precedence.
allow_resize = true

; Used when lock_screen_size=true
columns = 80
rows = 25

; Used when lock_screen_size=false
min_columns = 80
max_columns = 160
min_rows = 24
max_rows = 60

; Optional feature toggles
enable_touch_handlers = true
enable_mouse_wheel_arrows = true
enable_render_speed_patch = true
enable_parent_audio_unlock_bridge = true
enable_canvas_scale = true
