; Drascula: The Vampire Strikes Back (syncdrascula) installer data for
; install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncdrascula
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncdrascula)

Name: Drascula: The Vampire Strikes Back
Desc: A freeware comedy-horror point-and-click adventure, as a BBS door (ScummVM). Requires a sixel-capable graphics terminal (e.g. SyncTERM); mouse supported.
By:   Alcachofa Soft / Emilio de Paz (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/19

; ---------------------------------------------------------------------------
; The door itself: a native binary (the SyncSCUMM ScummVM backend,
; src/doors/syncscumm) run with raw (binary) socket I/O, fed the DOOR32.SYS
; drop file (%f) for the comm socket + time left. Saves are per-user AND
; per-node-independent: --savepath points ScummVM's SavefileManager at
; data/user/<####>/drascula/ and -c gives the same user their own scummvm.ini,
; so two nodes never race one save slot or one config file.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (the door emits raw
;                  sixel/JXL graphics and reads the socket itself)
;   XTRN_MULTIUSER -- multiple nodes may run it at once
;   XTRN_NODISPLAY -- no local console window for the door on the BBS machine
;                  (the door draws to the CLIENT's terminal); a sysop who wants
;                  the window back turns it off in SCFG -> External Programs ->
;                  Drascula -> Disable Local Display.
; startup_dir is intentionally left unset: install-xtrn.js then defaults it to
; THIS door directory, so the door runs with its own dir as CWD -- where
; getdata.js drops the game data (Packet.001 and the audio/ soundtrack) and
; where the door looks for an optional syncscumm.ini (door-wide settings:
; subtitles, sixel ceiling, audio), seeded below from syncscumm.example.ini.
;
; No --path is given. Like Beneath a Steel Sky (syncbass) and unlike Flight of
; the Amazon Queen (syncqueen, two builds), Drascula is a single flat build:
; door/syncscumm.cpp's main() defaults --path to this startup dir and, finding
; no ./talkie or ./floppy subdir, uses it as-is. ScummVM detects the game here
; as game id "drascula" (the trailing argument below). Audio rides the
; subtitles-auto default: speech/music to a terminal that can play it,
; subtitles to one that cannot.
;
; The trailing "drascula" is ScummVM's game id for the English freeware build
; (verified with --detect: "drascula:drascula -- Drascula: The Vampire Strikes
; Back (DOS/English)"). The drascula engine was compiled into the SyncSCUMM
; build alongside scumm/sky/queen/lure/agi/sci. cmd is capped at LEN_CMD (100
; chars, sbbsdefs.h) in the runtime xtrn_t struct the Terminal Server execs
; from -- install-xtrn.js does NOT enforce this, so an oversized cmd would
; install "successfully" but silently truncate at first run. This cmd is 87
; chars -- under budget, verified by hand.
;
; The drascula engine needs its ScummVM engine-data file, drascula.dat, which
; ships in THIS package directory -- the door finds it via --path. It is NOT
; part of the game data getdata.js fetches (it belongs to ScummVM, not the
; game), so it is provided here rather than downloaded. Packet.001 (the game)
; is fetched by getdata.js; the CD soundtrack (audio/trackNN.mp3) is optional
; -- without it Drascula plays with the engine's own Adlib music.
; ---------------------------------------------------------------------------
[prog:DRASCULA]
name          = Drascula: The Vampire Strikes Back
cmd           = syncscumm%. %f --savepath=%juser/%4/drascula -c %juser/%4/drascula/scummvm.ini drascula
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Drascula door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference copy of the ScummVM game configuration in THIS directory.
; cmd's -c actually points ScummVM at each user's OWN scummvm.ini, under
; data/user/<####>/drascula/ -- a path that does not exist yet at install
; time, so ScummVM creates it lazily (from its own built-in defaults) the
; first time that user launches the door; this step cannot seed it directly.
; What it does instead: only the version-controlled template
; scummvm.example.ini is checked in, so the installer copies it to THIS
; directory's scummvm.ini, giving the sysop a known-good [drascula] template
; to read, hand-copy into a user's data/user/<####>/drascula/scummvm.ini, or
; diff a player-edited config against. If scummvm.ini already exists here, the
; installer prompts before overwriting -- an edited copy is not clobbered.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Seed the door's OWN config from its template. Unlike scummvm.ini above
; (ScummVM's per-user config), syncscumm.ini is read by the door from THIS
; package dir at launch (subtitles, sixel ceiling, audio); the seeded copy
; holds only defaults, so it changes nothing until a sysop edits it. Prompts
; before overwriting an edited copy.
; ---------------------------------------------------------------------------
[copy:syncscumm.example.ini]
dest = syncscumm.ini

; ---------------------------------------------------------------------------
; Game data: Drascula: The Vampire Strikes Back was released as freeware by its
; author, and ScummVM hosts it. getdata.js fetches it into this directory,
; verifying each archive against ScummVM's published .sha256 (via
; CryptContext's SHA-2 hash) before unpacking: the required game (Packet.001)
; and the optional CD-audio soundtrack (audio/trackNN.mp3). Idempotent -- safe
; to re-run; a marker already present is left alone.
;
; Wired as an [exec:] step (install-xtrn.js's [exec:] loop only accepts a
; ".js" file, and a .sh could not run on a Windows install anyway). Downloads
; over HTTPS via HTTPRequest.Download and extracts natively (the Archive
; object). Non-fatal (required = false): a failed or declined download still
; lets the install complete; re-run by hand any time:
;     jsexec ../xtrn/syncdrascula/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Drascula is a freeware game; getdata.js downloads it from ScummVM's own hosting over HTTPS and sha256-verifies it.
prompt   = Download the Drascula game data now?
required = false
