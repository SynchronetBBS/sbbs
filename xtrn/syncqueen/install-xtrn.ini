; Flight of the Amazon Queen (syncqueen) installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncqueen
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncqueen)

Name: Flight of the Amazon Queen
Desc: A freeware point-and-click adventure, as a graphical BBS door (ScummVM)
By:   Rob Swindell / Krome Studios (game), ScummVM team (engine)
Cats: Games
Subs: Adventure
Inst: 2026/07/18

; ---------------------------------------------------------------------------
; The door itself: a native binary (the SyncSCUMM ScummVM backend,
; src/doors/syncscumm) run with raw (binary) socket I/O, fed the DOOR32.SYS
; drop file (%f) for the comm socket + time left. Saves are per-user AND
; per-node-independent: --savepath points ScummVM's SavefileManager at
; data/user/<####>/queen/ and -c gives the same user their own
; scummvm.ini, so two nodes never race one save slot or one config file.
;   type    = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE -- native (non-script) executable
;   XTRN_BIN    -- binary I/O: no charset/LF translation (the door emits raw
;                  sixel/JXL graphics and reads the socket itself)
;   XTRN_NODISPLAY -- no local console window for the door. The door draws
;                  to the CLIENT's terminal; on Windows, Synchronet would
;                  otherwise spawn it with CREATE_NEW_CONSOLE and pop up a
;                  console window on the BBS machine for every session
;                  (sbbs3/xtrn.cpp). Nothing is lost by hiding it: the
;                  door's own diagnostics are the ScummVM engine's normal
;                  stdout/stderr, which XTRN_NODISPLAY does not silence --
;                  only the extra window is suppressed. A sysop who wants
;                  the window back turns this off in SCFG -> External
;                  Programs -> Flight of the Amazon Queen -> Disable Local
;                  Display.
; startup_dir is intentionally left unset: install-xtrn.js then defaults it
; to THIS door directory, so the door runs with its own dir as CWD -- which
; is exactly where --path=. resolves, and where the door itself looks for an
; optional syncscumm.ini (door-wide settings: subtitles, sixel ceiling,
; audio) if a sysop drops one in from
; src/doors/syncscumm/syncscumm.example.ini; this package does not seed one
; -- a missing file just means the door's own defaults apply.
;
; --path=. is the package dir; the door does NOT use the caller's game data
; as-is -- door/syncscumm.cpp's main() rewrites the --path argument before
; ScummVM ever sees it, picking THIS session's Talkie or Floppy build by
; whether the session can actually play digital audio (sst_select_datadir(),
; SyncSCUMM M5 Task 1): "./talkie" (speech) when it can, "./floppy" (text)
; when it can't, falling back to "." itself if neither subdir exists. Both
; are fetched into place by getdata.js below.
;
; cmd is capped at LEN_CMD (100 chars, sbbsdefs.h) in the runtime xtrn_t
; struct the C++ Terminal Server actually execs from; install-xtrn.js itself
; does NOT enforce this length, so an oversized cmd would install
; "successfully" but silently truncate the first time the BBS actually runs
; it. This cmd is 76 chars -- under budget, verified by hand at authoring
; time (no automated check here).
;
; No external engine-data (the SYNCSCUMM_DATA env var / --extrapath other
; doors' entries rely on for shared runtime tables like sky.cpt) is needed
; for Queen -- verified against the actual freeware downloads, not assumed:
; the Talkie build's queen.1c opens with ScummVM's own 'QTBL' magic (a
; resource file rebuilt by ScummVM's compression_queen tool with its lookup
; table embedded inline), and the Floppy build's queen.1 is byte-for-byte
; the exact size ScummVM's engine hardcodes as version "PEM10" -- both paths
; in queen/resource.cpp that need an external queen.tbl are bypassed. If a
; future non-freeware Queen release (a raw, un-rebuilt CD dump) is ever
; substituted here, it WOULD need queen.tbl and SYNCSCUMM_DATA; that is not
; this package's freeware default.
; ---------------------------------------------------------------------------
[prog:SYNCQUEEN]
name          = Flight of the Amazon Queen
cmd           = scummvm%. %f --savepath=%juser/%4/queen -c %juser/%4/queen/scummvm.ini queen
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install the Flight of the Amazon Queen door (native, DOOR32.SYS, per-user saves).

; ---------------------------------------------------------------------------
; Seed a reference copy of the ScummVM game configuration in THIS directory.
; cmd's -c actually points ScummVM at each user's OWN scummvm.ini, under
; data/user/<####>/queen/ -- a path that does not exist yet at install time,
; so ScummVM creates it lazily (from its own built-in defaults) the first
; time that user launches the door; this step cannot seed it directly. What
; it does instead: only the version-controlled template scummvm.example.ini
; is checked in, so the installer copies it to THIS directory's
; scummvm.ini, giving the sysop a known-good [queen] template to read,
; hand-copy into a user's data/user/<####>/queen/scummvm.ini, or diff a
; player-edited config against. If scummvm.ini already exists here, the
; installer prompts before overwriting -- an edited copy is not clobbered
; without confirmation.
; ---------------------------------------------------------------------------
[copy:scummvm.example.ini]
dest = scummvm.ini

; ---------------------------------------------------------------------------
; Game data: UNLIKE Master of Orion's commercial LBX files, Flight of the
; Amazon Queen is officially freeware -- John Passfield & Steve Stamatiadis
; released it for free redistribution, and ScummVM hosts both English
; builds. getdata.js fetches BOTH into this directory (talkie/ for the
; speech build, floppy/ for the text-only build; the door picks per-session,
; see above), verifying each zip against ScummVM's published .sha256 (via
; CryptContext's SHA-2 hash) before unpacking. Idempotent -- safe to re-run;
; a build whose marker file already exists is left alone.
;
; Wired as an [exec:] step (unlike the POSIX-shell getdata.sh this replaced
; -- install-xtrn.js's [exec:] loop only accepts a ".js" file:
; install_exec_cmd() in exec/install-xtrn.js hard-rejects anything else,
; "Only '.js' files may be executed" -- and a .sh could never run on a
; Windows install anyway). Downloads over HTTPS via HTTPRequest.Download and
; extracts natively (the Archive object, no shelling to unzip), matching
; this door family's other .js fetchers (syncmoo1/getdata.js,
; exec/load/syncretro_getcore.js). Non-fatal (required = false): a failed
; or declined download still lets the install complete; re-run by hand any
; time network access is available:
;     jsexec ../xtrn/syncqueen/getdata.js
; ---------------------------------------------------------------------------
[exec:getdata.js]
note     = Flight of the Amazon Queen needs its freeware game data (both English builds), fetched over HTTPS from scummvm.org and sha256-verified.
prompt   = Download the Flight of the Amazon Queen game data now?
required = false
