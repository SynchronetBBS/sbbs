; ScummVM configuration template for the Flight of the Amazon Queen door.
;
; This is the version-controlled TEMPLATE -- don't edit it in place.
; install-xtrn.ini's [copy:] step copies it to THIS directory's
; scummvm.ini as a reference; the file ScummVM actually reads at runtime is
; each user's own copy under data/user/<####>/queen/scummvm.ini (the -c
; argument in install-xtrn.ini's cmd), which ScummVM creates from its own
; built-in defaults the first time that user launches the door. Hand-copy
; this template there (or the relevant lines) if you want every new player
; to start from these settings instead of ScummVM's stock defaults.
;
; No path=/savepath= here: the door rewrites --path per session (Talkie vs
; Floppy, see install-xtrn.ini) and --savepath is already set on the door's
; own command line -- either one in here would just be overridden or ignored.
; Keep this minimal; ScummVM fills in everything else itself.

[scummvm]
gui_return_to_launcher_at_exit=false

[queen]
description=Flight of the Amazon Queen
gameid=queen
