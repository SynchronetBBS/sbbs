; SyncDuke configuration template.
;
; The installer copies this to syncduke.ini (which you then edit); this
; .example.ini is the version-controlled template -- don't edit it in place.

[grp]
; Directory containing the base Duke Nukem 3D GRP file. SyncDuke ships NO game
; data. The shareware DUKE3D.GRP (11,035,779 bytes, "SHAREWARE 1.3D") is freely
; redistributable; the Full 1.3D / Plutonium 1.4 / Atomic 1.5 GRPs you own also
; work.
;
; Leave blank to look for duke3d*.grp in SyncDuke's own directory -- i.e. just
; drop DUKE3D.GRP beside the binary. Set an absolute path to keep the GRP in a
; shared location instead. (The engine writes its config/saves into this same
; directory, so it must be writable.)
dir =
