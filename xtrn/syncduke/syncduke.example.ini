; SyncDuke configuration template.
;
; The installer copies this to syncduke.ini (which you then edit); this
; .example.ini is the version-controlled template -- don't edit it in place.

[grp]
; Directory containing the base Duke Nukem 3D GRP file. SyncDuke ships NO game
; data. The shareware DUKE3D.GRP (11,035,779 bytes, "SHAREWARE 1.3D") is freely
; redistributable; the Full 1.3D / Plutonium 1.4 / Atomic 1.5 GRPs you own also
; work.
;
; Leave blank to look for duke3d*.grp in SyncDuke's own directory -- i.e. just
; drop DUKE3D.GRP beside the binary. Set an absolute path to keep the GRP in a
; shared location instead. (The engine writes its config/saves into this same
; directory, so it must be writable.)
dir =

; [lobby] -- the optional JS lobby front-end (lobby.js); ignored by the door binary.

[lobby]
; live -- show a live "who's online + recent activity" panel anchored to the
; bottom of the menu, refreshed ~1/s (SyncDuke players listed first). It repaints
; the bottom rows in place and grows upward over the art as more nodes appear, so
; it suits ANSI terminals only. Enabled here; set false for a plain static menu
; (recommended for non-ANSI-capable terminals). The code default when this key is
; absent is off.
live = true
;
; activity_max -- how many recent game events the full-screen activity view lists
; (the bottom panel is bounded by its own height). Default 18.
;activity_max = 18
;
; activity_max_age -- hide game events older than this from BOTH the panel and the
; activity view. In DAYS (fractions OK, e.g. 0.5); or with a unit suffix (12h, 1w).
; 0 or blank = no age limit (newest shown regardless of age). Default 0.
;activity_max_age = 0
;
; panel_rows -- max rows in the bottom live panel (live nodes first, then recent
; activity fills the rest, bottom-anchored). Default 6.
;panel_rows = 6
;
; enter_sound -- play a one-shot sound once when a player enters the lobby, on a
; SyncTERM that can decode audio files (silent on any other terminal). A path to a
; WAV/OGG/FLAC/VOC file you supply (relative to this door's dir, or absolute) -- or
; a wildcard (e.g. quips/*.wav) from which one match is chosen at random each entry.
; E.g. a set of Duke voice quips you extract from your own GRP. NOTHING ships here
; (don't redistribute copyrighted sound). Blank/unset = no entry sound.
;enter_sound = quips/*.wav

[net]
; Co-op networking, read by the LOBBY (lobby.js) -- not the direct single-player
; launcher. SyncDuke v1 co-op is peer 2-player on the same LAN: the player who
; Creates a game hosts it (their door is the "master", player 0) and the joiner
; dials it. The master always listens on all interfaces (0.0.0.0), so same-host
; play (two nodes on this BBS) needs NOTHING here -- joiners use 127.0.0.1.
;
; advertise -- for CROSS-HOST play (a second BBS/host on the same LAN, sharing
; this games registry over a mount): the address joiners on the OTHER host dial
; to reach games hosted here -- this host's LAN IP (or a DNS name). Blank =
; same-host only. NOTE: the game protocol has no authentication; once reachable on
; a routable address any host that can reach the UDP port + speaks the right Duke
; version can join. Restrict exposure with a host firewall.
;
; Shared multi-host install (one syncduke.ini seen by every host): a lone
; advertise can't be right for all of them, so put each host's value in a
; [net:<hostname>] section -- <hostname> is that host's short name
; (Synchronet's system.local_host_name). Its keys overlay [net] for that host:
;     [net:bbs-east]
;     advertise = 192.168.1.10
;     [net:bbs-west]
;     advertise = 192.168.1.11
advertise =

; UDP port range the host (master) listens on -- one port per concurrent co-op
; match on this system.
port_low  = 25000
port_high = 25015

; stale -- a waiting (unjoined) game older than this many seconds is dropped from
; the Join list (its host is presumed gone). Covers the door's ~60s handshake
; wait plus mount-attribute lag.
stale = 90

[dukematch]
; Deathmatch options, read by the LOBBY (lobby.js) when a player picks "Dukematch"
; in the Create menu -- the door binary reads none of these. (Co-op ignores them.)
;
; submode -- spawn: weapons/items respawn (the arcade default); nospawn: grab-once.
submode = spawn
;
; monsters -- classic dukematch is player-vs-player only (monsters off). Set true for
; a monsters-in-the-arena variant.
monsters = false
;
; respawn_items -- respawn items/inventory over time (independent of weapon spawn).
respawn_items = false

[game]
; Offer the in-game RECORD (demo) menu option. OFF by default: a recorded demo
; (demo1.dmo) is useless to a BBS user who can't download it, and just wastes
; disk in the per-user dir. Set to true to re-enable the menu option + recording.
record = false

; attract_demos -- play Duke's built-in title-screen attract demos when the menu
; sits idle (the DEMO*.DMO lumps in the GRP). The Atomic / Full 1.3D-1.5 GRPs ship
; them; the shareware GRP does not. OFF by default so single-player drops straight
; to the menu instead of a demo the remote user didn't ask for (which would also
; stream a demo's worth of frames). Set true to restore the classic attract loop.
attract_demos = false

; ---------------------------------------------------------------------------
; Playable extras: third-party user maps and add-on GRPs. One [map:<Name>]
; section per choice; <Name> is what players see in the lobby picker. When any
; are configured, Solo and Create prompt "what to play" (stock Duke is always
; choice #1); with none configured there is no prompt at all.
;
; Keys (paths absolute, or relative to this door's directory):
;   file = a user map (.map), played via the engine's usermap slot. Most
;          third-party maps need the FULL/Atomic duke3d.grp (not shareware).
;   grp  = an add-on group file overlaid on the base GRP (official expansions
;          like Duke It Out In D.C. ship this way; its CON scripts usually ride
;          inside the GRP and override the base ones automatically)
;   con  = a separate CON script file (only for an add-on that ships its CONs
;          as loose files -- omit when they're inside the GRP; a con= pointing
;          at a missing file aborts the launch)
;
; Examples:
;   [map:Roch]
;   file = maps/Roch.map
;
;   [map:Duke It Out In D.C.]
;   grp = addons/dukedc.grp

[video]
; JPEG-XL tier only: the door scales Duke's 320x200 frame up to fill the
; terminal's graphics canvas (SyncTERM), then centers it. scale_max caps the
; emitted image WIDTH in pixels so a very large/maximized window can't produce an
; enormous per-frame payload. Default 1280 (matches SyncDOOM). 0 = uncapped.
; Lower it to trade image size for bandwidth on a slow link; raise it to fill a
; bigger window. (No effect on the sixel or text tiers.)
scale_max = 1280

; SIXEL tier: max WIDTH (px) of the sixel image. The door fits Duke's frame into the
; terminal's window (learned from the startup probe) up to this width. A terminal whose
; 80-column window is wider than 640px -- e.g. a non-SyncTERM sixel terminal with a
; larger font -- fills more of its window at higher values, but a wider sixel is more
; bytes on the wire (sixel is RLE). Default 1024; lower to 640 for the old, more
; bandwidth-conservative size. Clamped to 320..1024. (No effect on SyncTERM, which is
; sized from its exact graphics canvas, nor on the JXL/text tiers.)
sixel_max_width = 1024

; When a sixel terminal does NOT report its exact pixel size (ESC[14t), estimate its
; window from the cell size it DOES report (ESC[16t) times the text grid, instead of
; assuming an 8x16 font. true fills a larger-font window correctly; set false to force
; the 8x16 assumption (the older behavior). No effect when the terminal reports exact
; pixels or a graphics canvas (SyncTERM).
use_cell_size = true

; TEXT tiers: which character set the door emits for the block-character tiers (the
; SyncTERM-independent fallback used when the terminal has no sixel/JXL). The door is
; installed "Translate Character Set: No" (XTRN_BIN), so it emits the charset directly.
;   auto  - detect from the client (Synchronet's node terminal.ini); the default.
;   utf8  - force UTF-8: block tiers use native Unicode glyphs (U+2580, ...) and the
;           higher-resolution quadrant + sextant tiers become available in the F4 cycle.
;   cp437 - force CP437 block bytes; quadrant/sextant are not offered (a CP437 terminal
;           would show them as missing-glyph boxes).
; Leave at auto unless the client's reported charset is wrong for your setup.
charset = auto

[audio]
; Music encoding quality (SyncTERM audio-APC tier only). The door renders each
; track's OPL/FM music, encodes it to Ogg/Opus, and ships it to the terminal once
; (then it's cached client-side + door-side). This sets the Opus VBR quality, 0.0
; (smallest/lowest) .. 1.0 (largest/best). libsndfile maps it roughly linearly to
; bitrate: 0.06 ~= 40 kbps, 0.15 ~= 88 kbps, 0.30 ~= 165 kbps. Default 0.15 -- a
; good balance of fullness and upload size for FM music. Lower it to shrink the
; one-time music transfer on slow links; raise it for cleaner, fuller audio.
; Only affects NEWLY encoded tracks -- existing cached files are not re-transferred.
music_quality = 0.15

[debug]
; File debug log -- independent of the BBS's stderr/syslog capture, so a hangup,
; clean exit, or crash (it installs a crash handler) is recorded to a plain file.
;
; A BARE filename (no path separator) lands in the door's shared data dir,
; <SBBSDATA>/syncduke/ -- NOT the per-user dir. A relative path that DOES contain
; a separator is relative to the door's CWD, which is the per-user -home dir it
; chdir()s into (e.g. data/user/<usernum>/duke/); an absolute path can be shared.
; The node number is inserted before the extension when known, from $SBBSNNUM
; (syncduke.log -> syncduke_n<node>.log), so concurrent co-op nodes can't share a
; file. Env SYNCDUKE_LOG and the -log <path> door arg override this.
;
; Defaults to "syncduke.log" -- i.e. logging is ON, at
; data/syncduke/syncduke_n<node>.log. Set it blank to disable. The door's
; diagnostics otherwise exist only on its local console, which the door's
; XTRN_NODISPLAY setting hides (see install-xtrn.ini).
log = syncduke.log
