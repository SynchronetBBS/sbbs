; SyncDuke installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncduke
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncduke)

Name: SyncDuke
Desc: Duke Nukem 3D for the BBS -- SyncTERM sixel graphics, single-player
By:   Rob Swindell / 3D Realms
Cats: Games
Subs: Action, Duke Nukem, FPS
Inst: 2026/06/24

; ---------------------------------------------------------------------------
; Single-player Duke Nukem 3D over DOOR32.SYS. A native executable with binary
; (untranslated) socket I/O: it emits DECSIXEL graphics and reads the client
; socket itself, fed the DOOR32.SYS drop file (%f) for the comm socket + time
; left. Needs a SyncTERM-class sixel terminal.
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   graphics and reads the socket itself)
; The GRP file is located via syncduke.ini [grp] dir (seeded below); leave that
; blank to just drop DUKE3D.GRP beside the binary.
; -home gives each user their own storage dir for Duke's config (duke3d.cfg) and
; savegames -- %juser/%4/duke/ is data/user/<usernum>/duke/, created on first run
; (mirrors SyncDoom). Without it, config/saves would be shared in the GRP dir.
; ---------------------------------------------------------------------------
[prog:SYNCDUKE]
name          = SyncDuke (Duke Nukem 3D)
cmd           = syncduke%. %f -home %juser/%4/duke/
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER
execution_ars = ANSI
note          = Single-player Duke Nukem 3D via DOOR32.SYS. Requires a sixel-capable terminal (SyncTERM) and the shareware (or full) DUKE3D.GRP -- set its location in syncduke.ini [grp] dir, or drop it beside the binary. SyncDuke ships no game data.

; ---------------------------------------------------------------------------
; Seed the live configuration. syncduke.ini holds this install's settings (the
; [grp] dir the door reads to find DUKE3D.GRP). Only the documented template
; syncduke.example.ini is version-controlled, so the installer copies it to
; syncduke.ini here. If syncduke.ini already exists the installer prompts before
; overwriting -- an edited config is not clobbered without confirmation.
; ---------------------------------------------------------------------------
[copy:syncduke.example.ini]
dest = syncduke.ini
