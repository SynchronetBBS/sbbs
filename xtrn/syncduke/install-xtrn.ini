; SyncDuke installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncduke
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncduke)

Name: SyncDuke
Desc: Duke Nukem 3D for the BBS -- graphics, single-player + 2-player LAN co-op & dukematch. Requires a sixel-capable graphics terminal (e.g. SyncTERM); mouse optional.
By:   Rob Swindell / 3D Realms
Cats: Games
Subs: Action, Duke Nukem, FPS
Inst: 2026/06/24

; ---------------------------------------------------------------------------
; Single-player Duke Nukem 3D over DOOR32.SYS. A native executable with binary
; (untranslated) socket I/O: it emits DECSIXEL graphics and reads the client
; socket itself, fed the DOOR32.SYS drop file (%f) for the comm socket + time
; left. Needs a SyncTERM-class sixel terminal.
;   type     = XTRN_DOOR32  -- write a DOOR32.SYS drop file (socket handle)
;   XTRN_NATIVE  -- native (non-script) executable
;   XTRN_BIN     -- binary I/O: no charset/LF translation (the door emits raw
;                   graphics and reads the socket itself)
; The GRP file is located via syncduke.ini [grp] dir (seeded below); leave that
; blank to just drop DUKE3D.GRP beside the binary.
; -home gives each user their own storage dir for Duke's config (duke3d.cfg) and
; savegames -- %juser/%4/duke/ is data/user/<usernum>/duke/, created on first run
; (mirrors SyncDoom). Without it, config/saves would be shared in the GRP dir.
; ---------------------------------------------------------------------------
; Require the door's executable BEFORE registering it. SyncDuke's binary is not
; shipped in the Synchronet package; get-binary.js fetches it on Windows (from a
; well-known URL on Vertrauen) or, on *nix, verifies build.sh/deploy.sh have put
; it here. required=true -> the install aborts if the binary is still missing, so
; SyncDuke never registers without a runnable executable.
; ---------------------------------------------------------------------------
[pre-exec:get-binary.js]
required = true

; ---------------------------------------------------------------------------
; The lobby (recommended): a JS menu (lobby.js, over the shared exec/load/
; game_lobby.js) to Create/Join 2-player LAN co-op games, play single-player, or
; view the controls. It spawns the native door itself (-s%H socket, no drop file),
; so this program is a plain JS module (cmd = ?lobby), not a DOOR32 native. Co-op
; networking is configured in syncduke.ini [net] (seeded below); same-host play
; works with no [net] setup at all.
; ---------------------------------------------------------------------------
[prog:SYNCDUKE_LOBBY]
name          = SyncDuke (Nukem 3D)
cmd           = ?lobby
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the SyncDuke lobby (create/join 2-player LAN co-op or dukematch, single-player, controls). Requires a sixel-capable terminal (SyncTERM) and the shareware (or full) DUKE3D.GRP -- set its location in syncduke.ini [grp] dir, or drop it beside the binary. SyncDuke ships no game data.

; ---------------------------------------------------------------------------
; Direct single-player launch (no lobby): drop straight into Duke Nukem 3D over
; DOOR32.SYS. A native executable with binary (untranslated) socket I/O. Install
; this INSTEAD of (or alongside) the lobby if you only want single-player.
; ---------------------------------------------------------------------------
;   XTRN_NODISPLAY -- no local console window for the door. The door draws to
;                   the CLIENT's terminal; on Windows, Synchronet would
;                   otherwise spawn it with CREATE_NEW_CONSOLE and pop up a
;                   console window on the BBS machine for every session
;                   (sbbs3/xtrn.cpp). The door's diagnostics are recorded to
;                   data/syncduke/syncduke_n<node>.log ([debug] log, on by
;                   default), so nothing is lost by hiding it. A sysop who
;                   wants the window back turns this off in SCFG -> External
;                   Programs -> <the door> -> Disable Local Display.
;                   (Existing installs keep their current flags -- this only
;                   affects a fresh install-xtrn run.)
[prog:SYNCDUKE]
name          = SyncDuke (Nukem 3D) single-player
cmd           = syncduke%. %f -home %juser/%4/duke/
type          = XTRN_DOOR32
settings      = XTRN_NATIVE | XTRN_BIN | XTRN_MULTIUSER | XTRN_NODISPLAY
execution_ars = ANSI
note          = Install a direct single-player launcher (no lobby), via DOOR32.SYS. Requires a sixel-capable terminal (SyncTERM) and the shareware (or full) DUKE3D.GRP -- set its location in syncduke.ini [grp] dir, or drop it beside the binary. SyncDuke ships no game data.

; ---------------------------------------------------------------------------
; Seed the live configuration. syncduke.ini holds this install's settings (the
; [grp] dir the door reads to find DUKE3D.GRP). Only the documented template
; syncduke.example.ini is version-controlled, so the installer copies it to
; syncduke.ini here. If syncduke.ini already exists the installer prompts before
; overwriting -- an edited config is not clobbered without confirmation.
; ---------------------------------------------------------------------------
[copy:syncduke.example.ini]
dest = syncduke.ini

; ---------------------------------------------------------------------------
; Optionally fetch the shareware Duke Nukem 3D GRP so the door is playable out
; of the box. SyncDuke ships no game data -- the Full/Plutonium/Atomic GRPs you
; own you supply yourself, but the shareware Episode 1 (DUKE3D.GRP, 11,035,779
; bytes) is freely redistributable, so download.js fetches 3D Realms' original
; shareware install package and extracts the GRP into the [grp] dir (default:
; beside the binary). Idempotent (skips a GRP already present) and non-fatal if
; it can't reach the internet -- you can always drop a GRP in by hand. Runs
; after the config copy above so it can read the [grp] dir from syncduke.ini.
; ---------------------------------------------------------------------------
[exec:download.js]
note     = SyncDuke needs a Duke Nukem 3D GRP file. The shareware Episode 1 GRP can be downloaded now.
prompt   = Download the shareware DUKE3D.GRP now (~6 MB) so SyncDuke is playable out of the box?
required = false
