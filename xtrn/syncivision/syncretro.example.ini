; SyncRetro -- Intellivision.  TEMPLATE.
;
; The installer copies this to syncretro.ini, which is what the door and the
; lobby actually read.  Edit THAT file, not this one -- an upgrade overwrites
; this template, and never your syncretro.ini.

[audio]
; The player can change the volume in-game with '+' and '-' (10% a step), and
; the door SHOWS the new level on the bottom row. At 0 it sends no audio at all
; -- no encode, no upload, no queue -- so a player who wants quiet costs zero
; bandwidth rather than streaming Opus his terminal would discard. `volume` here
; is only the level he STARTS at.
; enabled  = true
; quality  = 0.15
; volume   = 100
; chunk_ms = 100
; prebuffer = 3

[disc]
; Cartridges whose paddle follows disc ROTATION rather than a held direction.
; On these, holding Left/Right sweeps the disc so the paddle travels smoothly;
; everywhere else a held direction pins the disc, exactly as the hardware does.
; Case-insensitive substrings of a cartridge's filename, comma-separated.
rotate = Brickout

[video]
; The SHAPE the picture is drawn at. A console's pixels are NOT square: the NES's
; 256x240 framebuffer was shown on a 4:3 television, so drawing it at 256:240
; (1.067) makes it a quarter too narrow.
;
;   core     what the core asks for -- the NES's 1.219 (the 8:7 pixel-aspect
;            convention), FreeIntv's 1.5714. Matches every other libretro
;            frontend. THE DEFAULT.
;   4:3      what a television actually showed (1.333). Wider than the NES's
;            reported 1.219; some prefer it, and it is arguably the more honest
;            number for a CRT-era console.
;   square   the raw framebuffer, unstretched. The door's behavior before M3.
;   <number> anything you like, e.g. 1.25
;
; aspect = core
;
; ----------------------------------------------------------------------------
; WHY THE INTELLIVISION NEEDS NO SETTING, AND THE NES DOES.
;
; The door emits pixels; whether they are SQUARE when they reach the eye is the
; TERMINAL's decision. SyncTERM's classic VGA modes ("80x25") are the mode 13h
; shape -- a 640x400 canvas shown as a 4:3 picture -- so every canvas pixel is
; 1.3333/1.6 = 0.8333 as wide as it is tall, and every image is squeezed
; horizontally by that factor. The "LCD 80x25" modes are the square-pixel
; variants and squeeze nothing.
;
; FreeIntv's native 352x224 is 1.571. Squeezed by 0.8333 it comes out at 1.31 --
; which is the 4:3 the Intellivision really output. The default is right here BY
; LUCK, and only in the VGA modes: in an LCD/square-pixel mode the same picture is
; the full 1.571, noticeably wide. If your players use those, `aspect = 4:3`.
;
; (The NES is the console where this bites: see xtrn/syncnes's template, which
; carries the measured numbers.)

[roms]
; Directory holding cartridges, relative to this file. Default: roms
dir = roms
; Extensions to consider, comma-separated. Default: int,bin,rom
ext = int,bin,rom
; Case-insensitive substrings; any filename containing one is hidden.
exclude =

[lobby]
; enter_sound -- play a one-shot sound once when a player enters the lobby, on a
; SyncTERM that can decode audio files (silent on any other terminal). A path to a
; WAV/OGG/FLAC/VOC file you supply (relative to this door's dir, or absolute) -- or
; a wildcard (e.g. sounds/*.wav) from which one match is chosen at random each
; entry. Prefer OGG or WAV: those decode everywhere, MP3 needs a newer libsndfile
; on the player's end. Blank/unset = no entry sound.
;
; NOTHING ships here (don't redistribute copyrighted sound). SyncDuke and SyncDOOM
; suggest extracting a sound from your own GRP or WAD; there is no equivalent for a
; cartridge. A console's sound is GENERATED by its sound chip as the game runs --
; the NES's APU, the Intellivision's AY-3-8910 -- so it is nowhere in the ROM as
; data, and no tool can pull it out. Supply your own file.
;enter_sound = sounds/*.wav
