; SyncRetro -- Intellivision installer data for install-xtrn.js
;   jsexec install-xtrn ../xtrn/syncivision
; (or, from the terminal:  ;exec ?install-xtrn ../xtrn/syncivision)

Name: Intellivision
Desc: Play Intellivision cartridges as a graphical BBS door (libretro / FreeIntv)
By:   Rob Swindell / FreeIntv (libretro core)
Cats: Games
Subs: Arcade, Retro, Intellivision
Inst: 2026/07/10

; ---------------------------------------------------------------------------
; The door itself is a native binary (src/doors/syncretro) that hosts the
; FreeIntv libretro core and renders it to the client's terminal. It is not
; shipped in the Synchronet package -- build it and install it here first:
;   *nix:     cd src/doors/syncretro && ./build.sh
;   Windows:  src\doors\syncretro\build.bat
;   both:     jsexec src/doors/syncretro/deploy.js
; deploy.js installs the binary where the lobby looks for it: FLAT at the root on
; Windows (syncretro.exe / .dll never collide with a *nix host's names), or in an
; <os>-<arch> sub-dir on *nix (linux-x64/, linux-arm64/, darwin-arm64/, ...) so a
; shared install can serve several *nix hosts without their same-named binaries
; colliding. getcore.js installs the core the same way, and the lobby resolves it
; automatically (sv_target).
;
; The Intellivision BIOS (exec.bin + grom.bin) and the cartridges are content the
; SYSOP supplies -- they are copyrighted and not shipped. They are
; platform-independent, so they go at the ROOT of this directory: drop
; exec.bin/grom.bin here and cartridges into roms/. The lobby refuses to start
; without the BIOS and says so; see README.md / DESIGN.md.
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; The lobby: a menu to pick a cartridge and play it. Runs the JS frontend
; (lobby.js), which spawns the native door itself via bbs.exec() -- with
; EX_NODISPLAY, so on Windows no local console window pops up per session
; (the door draws to the CLIENT's terminal; its own diagnostics are captured to
; data/syncretro/syncretro_n<node>.log). There is no separate direct-launch
; registration, because which cartridge to run is the lobby's whole job.
; ---------------------------------------------------------------------------
[prog:SYNCIVISION]
name          = Intellivision
cmd           = ?lobby
settings      = XTRN_MULTIUSER
execution_ars = ANSI
note          = Install the Intellivision door lobby (pick a cartridge and play).

; ---------------------------------------------------------------------------
; Optionally fetch the FreeIntv libretro core so the door is playable out of the
; box. FreeIntv is GPLv2+ (freely redistributable), unlike the BIOS/cartridges,
; so getcore.js can install it automatically: it uses a copy already here or one
; you dropped in (a loose file or the buildbot .zip) and only downloads from the
; libretro buildbot when neither is present -- fetching the right build for this
; platform (Windows -> 32-bit windows/x86 .dll, since the door is Win32; *nix ->
; .so; macOS -> .dylib). Idempotent and non-fatal: it skips a core already
; present and never aborts the install if it can't reach the internet -- you can
; always drop the core in by hand.
; ---------------------------------------------------------------------------
[exec:getcore.js]
note     = SyncRetro needs the FreeIntv libretro core. It is free (GPLv2+) and can be downloaded now.
prompt   = Download the FreeIntv core now so the Intellivision door is playable out of the box?
required = false
